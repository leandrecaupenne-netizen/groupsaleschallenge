// === Shareable player card (PNG via canvas) ===
function generatePlayerCard(person, mode) {
  if (!person) return;
  // Load the logo AND the player's portrait (same-origin /cards/*.png → no canvas
  // taint), then draw once both have settled (loaded or failed).
  const photoSrc = photoFor(person.name);
  let logo = null, photo = null, pending = 0, done = false;
  const tryDraw = () => { if (pending <= 0 && !done) { done = true; drawPlayerCard(person, logo, photo, mode); } };
  if (LOGO_DATA_URI) {
    pending++; const li = new Image();
    li.onload = () => { logo = li; pending--; tryDraw(); };
    li.onerror = () => { pending--; tryDraw(); };
    li.src = LOGO_DATA_URI;
  }
  if (photoSrc) {
    pending++; const pi = new Image();
    pi.onload = () => { photo = pi; pending--; tryDraw(); };
    pi.onerror = () => { pending--; tryDraw(); };
    pi.src = photoSrc;
  }
  if (pending === 0) tryDraw();
}

function drawPlayerCard(person, logo, photo, mode) {
  const W = 760, H = 1080, s = 2; // 2x for crisp output
  const cv = document.createElement('canvas');
  cv.width = W * s; cv.height = H * s;
  const ctx = cv.getContext('2d');
  ctx.scale(s, s);
  const color = colorForTeam(person.team);
  const rr = (x, y, w, h, r) => { ctx.beginPath(); ctx.moveTo(x + r, y); ctx.arcTo(x + w, y, x + w, y + h, r); ctx.arcTo(x + w, y + h, x, y + h, r); ctx.arcTo(x, y + h, x, y, r); ctx.arcTo(x, y, x + w, y, r); ctx.closePath(); };

  // Background
  const g = ctx.createLinearGradient(0, 0, 0, H);
  g.addColorStop(0, '#2D3550'); g.addColorStop(0.5, '#1E2A78'); g.addColorStop(1, '#131a4d');
  ctx.fillStyle = g; ctx.fillRect(0, 0, W, H);
  // diagonal stripes
  ctx.strokeStyle = 'rgba(255,255,255,0.04)'; ctx.lineWidth = 2;
  for (let i = -H; i < W; i += 26) { ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i + H, H); ctx.stroke(); }
  // outer frame
  ctx.strokeStyle = color; ctx.lineWidth = 8; rr(16, 16, W - 32, H - 32, 26); ctx.stroke();
  // flag banner — the player's own country
  const bw = (W - 56) / 3;
  flagForTeam(person.team).forEach((c, i) => { ctx.fillStyle = c; ctx.fillRect(28 + i * bw, 34, bw, 10); });

  // logo + titles
  if (logo) { const lw = 84, lh = logo.height * (lw / logo.width); ctx.drawImage(logo, (W - lw) / 2, 52, lw, lh); }
  ctx.textAlign = 'center';
  ctx.fillStyle = '#F2C75C'; ctx.font = '700 20px Inter, sans-serif';
  ctx.fillText('DEVOTEAM WORLD CUP', W / 2, 158);
  ctx.fillStyle = 'rgba(255,255,255,0.65)'; ctx.font = '600 12px monospace';
  ctx.fillText('SALES CHALLENGE 2026', W / 2, 180);

  // player portrait — cut-out resting on a soft halo (mirrors the on-screen card)
  const cx = W / 2, cy = 306, R = 94;
  const halo = ctx.createRadialGradient(cx, cy - 8, R * 0.25, cx, cy, R * 1.3);
  halo.addColorStop(0, 'rgba(255,255,255,0.30)');
  halo.addColorStop(0.6, 'rgba(255,255,255,0.08)');
  halo.addColorStop(1, 'rgba(255,255,255,0)');
  ctx.fillStyle = halo; ctx.beginPath(); ctx.arc(cx, cy, R * 1.32, 0, Math.PI * 2); ctx.fill();
  if (photo && photo.width) {
    // bottom-anchored so the head shows above the halo, like .pc-photo
    const dW = R * 2.15, dH = dW * (photo.height / photo.width);
    ctx.drawImage(photo, cx - dW / 2, cy + R - dH + 4, dW, dH);
  } else {
    // fallback: initials disc
    ctx.beginPath(); ctx.arc(cx, cy, R, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(255,255,255,0.15)'; ctx.fill();
    ctx.strokeStyle = 'rgba(255,255,255,0.5)'; ctx.lineWidth = 3; ctx.stroke();
    const initials = person.name.split(/\s+/).map(w => w[0]).join('').slice(0, 2).toUpperCase();
    ctx.fillStyle = '#fff'; ctx.font = '700 60px "Arial Narrow", Impact, sans-serif';
    ctx.fillText(initials, cx, cy + 22);
  }

  // name + team
  ctx.fillStyle = '#fff'; ctx.textAlign = 'center';
  let name = person.name.toUpperCase();
  ctx.font = '700 44px "Arial Narrow", Impact, sans-serif';
  if (ctx.measureText(name).width > W - 80) ctx.font = '700 32px "Arial Narrow", Impact, sans-serif';
  ctx.fillText(name, W / 2, 452);
  ctx.fillStyle = '#F2C75C'; ctx.font = '700 18px Inter, sans-serif';
  ctx.fillText(person.team.toUpperCase() + (person.is_rookie ? '  ·  🌱 ROOKIE' : ''), W / 2, 481);

  // discipline pastille (same logic as the on-screen card)
  const yc = [];
  if (person.yellow_meetings) yc.push('🟨');
  if (person.yellow_gm) yc.push('🟨');
  const hasData = (person.ps_total || 0) > 0 || (person.ps_nb || 0) > 0 || (person.meetings || 0) > 0;
  const clean = !person.yellow_meetings && !person.yellow_gm && hasData;
  let badgeText = '', badgeBg = '', badgeFg = '';
  if (yc.length) { badgeText = yc.join('') + ' On a yellow card'; badgeBg = 'rgba(242,199,92,0.20)'; badgeFg = '#F2C75C'; }
  else if (clean) { badgeText = '✅ Playing by the rules'; badgeBg = 'rgba(48,200,140,0.22)'; badgeFg = '#5CE0A0'; }
  if (badgeText) {
    ctx.font = '700 17px Inter, sans-serif';
    const tw = ctx.measureText(badgeText).width;
    const pillW = tw + 44, pillH = 38, px = (W - pillW) / 2, py = 502;
    rr(px, py, pillW, pillH, 19); ctx.fillStyle = badgeBg; ctx.fill();
    ctx.fillStyle = badgeFg; ctx.textAlign = 'center'; ctx.fillText(badgeText, W / 2, py + 25);
  }

  // stat rows
  const gRank = sortedGoldenBoot.findIndex(p => p.name === person.name) + 1;
  const pRank = sortedPlaymaker.findIndex(p => p.name === person.name) + 1;
  const tRank = sortedPSTotal.findIndex(p => p.name === person.name) + 1;
  const rows = [
    ['⚽ GOLDEN BOOT', gRank ? '#' + gRank : '—', fmtMoney(person.ps_nb) + ' NB'],
    ['🎯 PLAYMAKER', pRank ? '#' + pRank : '—', Number(person.opps || 0).toFixed(0) + ' opps'],
    ['💰 PS TOTAL', fmtMoney(person.ps_total), '#' + tRank + ' overall'],
    ['📊 GROSS MARGIN', fmtPct(person.ps_total_gm), person.yellow_gm ? '🟨 below 25%' : '✅ on target'],
    ['🤝 MEETINGS / WK', fmtNum(person.meetings), person.yellow_meetings ? '🟨 under 5' : '✅ on target']
  ];
  let y = 558;
  rows.forEach(r => {
    rr(40, y, W - 80, 82, 16); ctx.fillStyle = 'rgba(255,255,255,0.07)'; ctx.fill();
    rr(40, y, 6, 82, 3); ctx.fillStyle = color; ctx.fill();
    ctx.textAlign = 'left'; ctx.fillStyle = 'rgba(255,255,255,0.7)'; ctx.font = '700 16px Inter, sans-serif';
    ctx.fillText(r[0], 64, y + 32);
    ctx.fillStyle = 'rgba(255,255,255,0.55)'; ctx.font = '500 13px Inter, sans-serif';
    ctx.fillText(r[2], 64, y + 58);
    ctx.textAlign = 'right'; ctx.fillStyle = '#F2C75C'; ctx.font = '700 38px "Arial Narrow", Impact, sans-serif';
    ctx.fillText(r[1], W - 64, y + 54);
    y += 94;
  });

  // footer
  ctx.textAlign = 'center'; ctx.fillStyle = 'rgba(255,255,255,0.55)'; ctx.font = '500 14px Inter, sans-serif';
  ctx.fillText('Final in Paris · 9 July 2026 · Victoria Paris (l’Arc)', W / 2, H - 40);

  const filename = person.name.replace(/[^a-z0-9]+/gi, '-').toLowerCase() + '-world-cup-card.png';
  if (mode === 'share') shareCanvas(cv, filename, person);
  else downloadCanvas(cv, filename);
}

function downloadCanvas(cv, filename) {
  cv.toBlob(blob => {
    if (!blob) return;
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = filename;
    document.body.appendChild(a); a.click();
    setTimeout(() => { URL.revokeObjectURL(a.href); a.remove(); }, 1000);
  }, 'image/png');
}

// Share the generated card as an IMAGE via the Web Share API (mobile "share
// sheet" — post to WhatsApp/Slack/etc. in one tap). Falls back to sharing/
// copying a deep-link, then to a plain download, so every device gets something.
function shareCanvas(cv, filename, person) {
  const url = location.origin + location.pathname + '?player=' + encodeURIComponent(person.name);
  cv.toBlob(async (blob) => {
    if (!blob) { downloadCanvas(cv, filename); return; }
    const file = new File([blob], filename, { type: 'image/png' });
    try {
      if (navigator.canShare && navigator.canShare({ files: [file] })) {
        await navigator.share({ files: [file], title: 'Devoteam World Cup', text: person.name + ' — Sales Challenge card' });
        return;
      }
    } catch (e) { if (e && e.name === 'AbortError') return; } // user dismissed the sheet
    try {
      if (navigator.share) { await navigator.share({ title: 'Devoteam World Cup', text: person.name + ' — Sales Challenge card', url }); return; }
    } catch (e) { if (e && e.name === 'AbortError') return; }
    downloadCanvas(cv, filename); // last resort
  }, 'image/png');
}

// Stripes for a team/individual: their exact country if known, otherwise the
// region (handles entity names like "FR - M Cloud" → France).
function flagForTeam(team) {
  const u = String(team || '').toUpperCase().trim();
  if (COUNTRY_FLAGS[u]) return COUNTRY_FLAGS[u];
  // Team names often carry a suffix ("PORTUGAL 2", "GERMANY North", "UK - Cyber").
  // Match the country name when it appears as a whole word so the EXACT flag wins
  // over the broader region palette.
  for (const country in COUNTRY_FLAGS) {
    if (u === country ||
        u.startsWith(country + ' ') || u.startsWith(country + '-') ||
        u.endsWith(' ' + country) ||
        u.indexOf(' ' + country + ' ') !== -1 || u.indexOf('-' + country) !== -1) {
      return COUNTRY_FLAGS[country];
    }
  }
  return FLAG_STRIPES[regionOf(team)] || FLAG_STRIPES.OTHER;
}
// Some flags can't be drawn as plain vertical stripes — they carry a crest or a
// cross. These are tagged with an SVG class so flagBars() renders the real flag.
COUNTRY_FLAGS.UK.flagImg = 'flag-uk';                 // Union Jack (not a tricolour → reads as France)
COUNTRY_FLAGS['UNITED KINGDOM'].flagImg = 'flag-uk';
COUNTRY_FLAGS.PORTUGAL.flagImg = 'flag-pt';           // green/red + armillary sphere & shield
// Render a flag's inner markup: a dedicated SVG flag when tagged, otherwise the
// vertical colour stripes. Used everywhere a flag appears (cards, rows, podium…).
function flagBars(colors) {
  if (colors && colors.flagImg) return `<i class="${colors.flagImg}"></i>`;
  return (colors || []).map(c => `<i style="background:${c}"></i>`).join('');
}

function drawStandings(logo) {
  const isNations = teamView === 'nations', isPlayers = teamView === 'players';
  const nr = isNations ? nationsRanking() : null;
  const top = isNations
    ? nr.map(n => ({ name: n.label, val: n.avg_ps }))
    : isPlayers
    ? sortedPSTotal.slice(0, 12).map(p => ({ name: p.name, val: p.ps_total }))
    : sortedTeams.slice(0, 12).map(t => ({ name: t.country, val: t.avg_ps }));
  // Theme the top bar after the leader's flag: the #1 nation (Nations) or the
  // #1 player's country/region (Players). Teams keep the brand stripe.
  // Nations / Players: flag of the leader. Teams: no flag (a brand stripe reads as
  // a country flag, e.g. red/white/green looks Italian) — use a plain gold accent.
  const stripes = (isNations && nr[0]) ? (FLAG_STRIPES[nr[0].region] || FLAG_STRIPES.OTHER)
    : (isPlayers && sortedPSTotal[0]) ? flagForTeam(sortedPSTotal[0].team)
    : null;
  const heading = isNations ? '🌍 NATIONS RANKING' : isPlayers ? '👤 PLAYER RANKING' : '🏆 TEAM RANKING';
  const footMetric = isPlayers ? 'PS Bookings Total' : 'Avg PS Bookings / person';
  const W = 820, rowH = 64, headH = 300, H = headH + top.length * rowH + 90, s = 2;
  const cv = document.createElement('canvas');
  cv.width = W * s; cv.height = H * s;
  const ctx = cv.getContext('2d'); ctx.scale(s, s);
  const rr = (x, y, w, h, r) => { ctx.beginPath(); ctx.moveTo(x + r, y); ctx.arcTo(x + w, y, x + w, y + h, r); ctx.arcTo(x + w, y + h, x, y + h, r); ctx.arcTo(x, y + h, x, y, r); ctx.arcTo(x, y, x + w, y, r); ctx.closePath(); };
  const g = ctx.createLinearGradient(0, 0, 0, H);
  g.addColorStop(0, '#2D3550'); g.addColorStop(0.5, '#1E2A78'); g.addColorStop(1, '#131a4d');
  ctx.fillStyle = g; ctx.fillRect(0, 0, W, H);
  ctx.strokeStyle = 'rgba(255,255,255,0.04)'; ctx.lineWidth = 2;
  for (let i = -H; i < W; i += 26) { ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i + H, H); ctx.stroke(); }
  ctx.strokeStyle = '#F2C75C'; ctx.lineWidth = 8; rr(16, 16, W - 32, H - 32, 26); ctx.stroke();
  if (stripes) {
    const bw = (W - 56) / 3;
    stripes.forEach((c, i) => { ctx.fillStyle = c; ctx.fillRect(28 + i * bw, 34, bw, 10); });
  } else {
    // Teams export: a single neutral gold bar (no flag connotation).
    ctx.fillStyle = '#F2C75C'; ctx.fillRect(28, 34, W - 56, 10);
  }
  if (logo) { const lw = 110, lh = logo.height * (lw / logo.width); ctx.drawImage(logo, (W - lw) / 2, 60, lw, lh); }
  ctx.textAlign = 'center';
  ctx.fillStyle = '#F2C75C'; ctx.font = '700 24px Inter, sans-serif';
  ctx.fillText('DEVOTEAM WORLD CUP', W / 2, 200);
  ctx.fillStyle = 'rgba(255,255,255,0.7)'; ctx.font = '600 13px monospace';
  ctx.fillText('SALES CHALLENGE 2026' + (period ? ' · ' + period.toUpperCase() : ''), W / 2, 224);
  ctx.fillStyle = '#fff'; ctx.font = '700 40px "Arial Narrow", Impact, sans-serif';
  ctx.fillText(heading, W / 2, 274);

  let y = headH;
  top.forEach((row, i) => {
    const lead = i === 0;
    rr(40, y, W - 80, rowH - 10, 12);
    ctx.fillStyle = lead ? 'rgba(242,199,92,0.22)' : 'rgba(255,255,255,0.06)'; ctx.fill();
    if (lead) { ctx.strokeStyle = 'rgba(242,199,92,0.7)'; ctx.lineWidth = 2; ctx.stroke(); }
    ctx.textAlign = 'left';
    ctx.fillStyle = i === 0 ? '#F2C75C' : i === 1 ? '#9CA3AF' : i === 2 ? '#B45309' : 'rgba(255,255,255,0.85)';
    ctx.font = '700 30px "Arial Narrow", Impact, sans-serif';
    ctx.fillText((['🥇', '🥈', '🥉'][i] || ('#' + (i + 1))), 60, y + 36);
    ctx.fillStyle = '#fff'; ctx.font = '700 22px Inter, sans-serif';
    ctx.fillText(row.name, 130, y + 35);
    ctx.textAlign = 'right'; ctx.fillStyle = '#F2C75C'; ctx.font = '700 26px "Arial Narrow", Impact, sans-serif';
    ctx.fillText(fmtMoney(row.val), W - 64, y + 36);
    y += rowH;
  });
  ctx.textAlign = 'center'; ctx.fillStyle = 'rgba(255,255,255,0.55)'; ctx.font = '500 13px Inter, sans-serif';
  ctx.fillText(footMetric + ' · Final in Paris, 9 July 2026', W / 2, H - 40);
  downloadCanvas(cv, isNations ? 'devoteam-world-cup-nations.png' : isPlayers ? 'devoteam-world-cup-players.png' : 'devoteam-world-cup-standings.png');
}

// Panini-style player card modal — opens when you tap a player anywhere
// (match-sheet rows, etc.). Big portrait-style card + the player's key stats.
// Holographic tilt + sheen on a Panini card: follows the pointer on desktop and
// the device tilt on mobile. No-op if the element is missing or reduced-motion.
function attachHolo(card) {
  if (!card) return;
  if (window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;
  const MAX = 9; // degrees of tilt
  const apply = (px, py) => {
    // px, py in 0..1 across the card
    card.style.setProperty('--mx', (px * 100).toFixed(1) + '%');
    card.style.setProperty('--my', (py * 100).toFixed(1) + '%');
    card.style.setProperty('--ry', ((px - 0.5) * 2 * MAX).toFixed(2) + 'deg');
    card.style.setProperty('--rx', ((0.5 - py) * 2 * MAX).toFixed(2) + 'deg');
  };
  const reset = () => {
    card.classList.remove('holo-active');
    card.style.setProperty('--rx', '0deg'); card.style.setProperty('--ry', '0deg');
    card.style.setProperty('--mx', '50%'); card.style.setProperty('--my', '50%');
  };
  const onMove = e => {
    const r = card.getBoundingClientRect();
    const x = (e.clientX - r.left) / r.width, y = (e.clientY - r.top) / r.height;
    if (x < 0 || x > 1 || y < 0 || y > 1) return;
    card.classList.add('holo-active'); apply(x, y);
  };
  card.addEventListener('pointermove', onMove);
  card.addEventListener('pointerleave', reset);
  // Device tilt (mobile): map gamma/beta to the sheen position.
  const onTilt = ev => {
    if (ev.gamma == null) return;
    const px = Math.min(1, Math.max(0, (ev.gamma + 30) / 60)); // -30..30 → 0..1
    const py = Math.min(1, Math.max(0, (ev.beta - 20) / 60));  // 20..80 → 0..1
    card.classList.add('holo-active'); apply(px, py);
  };
  if (window.DeviceOrientationEvent && 'ontouchstart' in window) {
    window.addEventListener('deviceorientation', onTilt);
    // clean up when the card leaves the DOM
    const obs = new MutationObserver(() => { if (!document.body.contains(card)) { window.removeEventListener('deviceorientation', onTilt); obs.disconnect(); } });
    obs.observe(document.body, { childList: true, subtree: true });
  }
}

// The Panini card body (foil card + stats grid) — shared by the player modal
// and the My Position page so the player view is identical everywhere.
function paniniCardInner(p) {
  const color = colorForTeam(p.team);
  const flag = flagForTeam(p.team);
  const goldenRank = sortedGoldenBoot.findIndex(x => x.name === p.name) + 1;
  const playmakerRank = sortedPlaymaker.findIndex(x => x.name === p.name) + 1;
  const totalRank = sortedPSTotal.findIndex(x => x.name === p.name) + 1;
  const licenceRank = sortedLicence.findIndex(x => x.name === p.name) + 1;
  const initials = p.name.split(/\s+/).map(w => w[0]).join('').slice(0, 2).toUpperCase();
  const cards = [];
  if (p.yellow_meetings) cards.push('🟨');
  if (p.yellow_gm) cards.push('🟨');
  // Discipline badge: yellow card(s) if breaking a rule, or a green ✅ "Clean
  // Sheet" when the player is playing fully by the rules (and has real data).
  const hasData = (p.ps_total || 0) > 0 || (p.ps_nb || 0) > 0 || (p.meetings || 0) > 0;
  const clean = !p.yellow_meetings && !p.yellow_gm && hasData;
  // Build a precise, per-player explanation (tap to reveal — works on touch,
  // where the hover title is useless).
  const meetOk = !p.yellow_meetings;
  const gmOk = !p.yellow_gm;
  const explainLines = [
    `<span class="pc-rule ${meetOk ? 'ok' : 'bad'}">${meetOk ? '✅' : '🟨'} Meetings: ${fmtNum(p.meetings)}/week ${meetOk ? '(target 5+)' : '(below 5 — yellow card)'}</span>`,
    `<span class="pc-rule ${gmOk ? 'ok' : 'bad'}">${gmOk ? '✅' : '🟨'} Gross Margin: ${fmtPct(p.ps_total_gm)} ${gmOk ? '(target ≥ 25%)' : '(below 25% — yellow card)'}</span>`
  ].join('');
  const explainHint = cards.length
    ? 'Two yellows make a red. Here\'s why:'
    : 'Fully by the rules — both VAR checks passed:';
  const disciplineBadge = (cards.length || clean)
    ? `<button class="pc-discipline ${cards.length ? 'warn' : 'ok'}" data-discipline aria-expanded="false">${cards.length ? cards.join('') + ' On a yellow card' : '✅ Playing by the rules'}<span class="pc-disc-i">ⓘ</span></button>
       <div class="pc-discipline-pop" hidden><div class="pc-disc-head">${explainHint}</div>${explainLines}</div>`
    : '';
  // Collectible "honours" — Panini-style achievement badges earned from the
  // player's standings. Shown as a row of chips under the stats.
  const honours = computeHonours(p, { goldenRank, playmakerRank, totalRank, licenceRank, clean });
  // Rarity tier (Sorare-style) from the player's best rank across categories.
  const bestRank = Math.min(...[goldenRank, playmakerRank, totalRank, licenceRank].filter(r => r > 0));
  const rarity = bestRank === 1 ? { label: 'UNIQUE', cls: 'unique' }
    : bestRank <= 3 ? { label: 'LEGENDARY', cls: 'legendary' }
    : bestRank <= 10 ? { label: 'RARE', cls: 'rare' }
    : bestRank <= 50 ? { label: 'LIMITED', cls: 'limited' }
    : { label: 'CLASSIC', cls: 'classic' };
  const stat = (label, value, sub, tab) => `
    <div class="pc-stat${tab ? ' pc-stat-link' : ''}"${tab ? ` data-goto="${tab}"` : ''}>
      <div class="pc-stat-val">${value}</div>
      <div class="pc-stat-label">${label}</div>
      ${sub ? `<div class="pc-stat-sub">${sub}</div>` : ''}
    </div>`;
  return `
    <div class="pc-card" style="--c:${color}">
      <div class="pc-card-top">
        <span class="pc-rarity pc-rarity-${rarity.cls}">${rarity.label}</span>
        <span class="pc-flag">${flagBars(flag)}</span>
      </div>
      <div class="pc-period-line">${period ? escapeHtml(period) : 'SALES CHALLENGE 2026'}</div>
      <div class="pc-avatar${photoFor(p.name) ? ' pc-avatar-photo' : ''}">${photoFor(p.name) ? `<img class="pc-photo" src="${photoFor(p.name)}" alt="${escapeHtml(p.name)}" loading="lazy" onerror="this.parentElement.classList.remove('pc-avatar-photo');this.remove()" /><span class="pc-photo-fallback">${escapeHtml(initials)}</span>` : `<span>${escapeHtml(initials)}</span>`}${cards.length ? `<span class="pc-cards">${cards.join('')}</span>` : clean ? `<span class="pc-cards pc-clean">✅</span>` : ''}</div>
      <div class="pc-name">${escapeHtml(p.name)}</div>
      <div class="pc-team">${escapeHtml(p.team)}${p.is_rookie ? ' · 🌱 ROOKIE' : ''}</div>
      ${disciplineBadge}
      <div class="pc-rating-row">
        <div class="pc-rating"><b>${totalRank ? '#' + totalRank : '—'}</b><span>PS RANK</span></div>
        <div class="pc-rating"><b>${fmtPct(p.ps_total_gm)}</b><span>GM</span></div>
        <div class="pc-rating"><b>${fmtNum(p.meetings)}</b><span>MTG/WK</span></div>
      </div>
    </div>
    <div class="pc-stats">
      ${stat('🥇 Golden Boot', goldenRank ? '#' + goldenRank : '—', fmtMoney(p.ps_nb) + ' NB', 'golden')}
      ${stat('🎯 Playmaker', playmakerRank ? '#' + playmakerRank : '—', Number(p.opps || 0).toFixed(0) + ' opps created', 'playmaker')}
      ${stat('💰 PS Total', fmtMoney(p.ps_total), '#' + totalRank + ' overall')}
      ${p.licence_gm > 0 ? stat('📜 Licence GM', licenceRank ? '#' + licenceRank : '—', fmtMoney(p.licence_gm), 'awards') : ''}
    </div>
    ${honours.length ? `<div class="pc-honours">${honours.map(h => `<button class="pc-honour" data-honour="${escapeHtml(h.tip)}" aria-expanded="false">${h.icon} ${h.label}</button>`).join('')}</div><div class="pc-honour-pop" hidden></div>` : ''}`;
}

// Collectible honours from a player's standings — small, motivating milestones.
function computeHonours(p, r) {
  const h = [];
  const best = Math.min(...[r.goldenRank, r.playmakerRank, r.totalRank, r.licenceRank].filter(x => x > 0));
  if (best === 1) h.push({ icon: '👑', label: 'League Leader', tip: 'Ranked #1 in a category' });
  else if (best <= 3) h.push({ icon: '🏅', label: 'Podium', tip: 'Top 3 in a category' });
  else if (best <= 10) h.push({ icon: '🔟', label: 'Top 10 Club', tip: 'Top 10 in a category' });
  if (r.goldenRank && r.goldenRank <= 5) h.push({ icon: '⚽', label: 'Sharpshooter', tip: `Top 5 Golden Boot (#${r.goldenRank})` });
  if (r.playmakerRank && r.playmakerRank <= 5) h.push({ icon: '🎯', label: 'Playmaker', tip: `Top 5 Playmaker (#${r.playmakerRank})` });
  if (r.licenceRank && r.licenceRank <= 3) h.push({ icon: '📜', label: 'Licence Pro', tip: `Top 3 Licence GM (#${r.licenceRank})` });
  // Double threat: top-10 in two different boards.
  const top10s = [r.goldenRank, r.playmakerRank, r.totalRank].filter(x => x > 0 && x <= 10).length;
  if (top10s >= 2) h.push({ icon: '🌟', label: 'Double Threat', tip: 'Top 10 in two categories' });
  if (r.clean) h.push({ icon: '🧤', label: 'Clean Sheet', tip: 'Playing fully by the rules' });
  if (p.is_rookie && r.goldenRank && r.goldenRank <= 20) h.push({ icon: '🌱', label: 'Rising Star', tip: 'Rookie in the Golden Boot top 20' });
  if ((p.meetings || 0) >= 8) h.push({ icon: '🏃', label: 'Engine', tip: `${fmtNum(p.meetings)} meetings/week` });
  return h.slice(0, 6);
}

                  <div class="member-who">
                    <span class="member-avatar${photoFor(m.name) ? ' has-photo' : ''}" style="--ac:${colorForTeam(m.team)}">${avatarInner(m.name)}</span>

                      <div class="member-name">${escapeHtml(m.name)}</div>

  `;

// Live countdown to the Paris final (9 July 2026).
const FINAL_DATE = new Date('2026-07-09T19:00:00+02:00');
function updateCountdown() {
  const el = document.getElementById('countdown-live');
  if (!el) return;
  const ms = FINAL_DATE.getTime() - Date.now();
  if (ms <= 0) { el.textContent = t('cd.live'); return; }
  const d = Math.floor(ms / 86400000), h = Math.floor(ms / 3600000) % 24,
        m = Math.floor(ms / 60000) % 60, s = Math.floor(ms / 1000) % 60;
  el.textContent = t('cd.fmt', { d, h, m, s });
}

function renderFooter() {
  return `
    <footer class="app-footer">
      <div class="countdown">${t('foot.final')}</div>
      <div>${t('foot.runs', { a: challenge_dates.start, b: challenge_dates.end })}</div>
      <div style="margin-top:8px;opacity:0.6">${t('foot.data')}</div>
    </footer>
  `;
}

// === Live news ticker ===
let lastTickerHTML = '';
let recentEvents = []; // leader-change headlines, newest first
function buildTickerItems() {
  const it = [];
  recentEvents.slice(0, 4).forEach(e => it.push(e));
  if (sortedTeams[0]) it.push(`🏆 ${sortedTeams[0].country} lead the World Cup — ${fmtMoney(sortedTeams[0].avg_ps)}/person`);
  if (sortedGoldenBoot[0]) it.push(`🥇 Golden Boot: ${sortedGoldenBoot[0].name} — ${fmtMoney(sortedGoldenBoot[0].ps_nb)} NB`);
  if (sortedPlaymaker[0]) it.push(`🎯 Playmaker: ${sortedPlaymaker[0].name} — ${Number(sortedPlaymaker[0].opps || 0).toFixed(0)} opps`);
  if (sortedRookies[0]) it.push(`🌱 Top rookie: ${sortedRookies[0].name} — ${fmtMoney(sortedRookies[0].ps_nb)}`);
  if (sortedLicence[0]) it.push(`💼 Licence leader: ${sortedLicence[0].name} — ${fmtMoney(sortedLicence[0].licence_gm)}`);
  if (period) it.push(`📅 ${period}`);
  return it;
}
function updateTicker() {
  const track = document.getElementById('ticker-track');
  if (!track) return;
  const items = buildTickerItems();
  if (!items.length) return;
  const seq = items.map(s => `<span class="ticker-item">${escapeHtml(s)}</span>`).join('<span class="ticker-dot">•</span>');
  if (seq === lastTickerHTML) return;      // unchanged -> keep scrolling smoothly
  lastTickerHTML = seq;
  // duplicate for a seamless loop
  track.innerHTML = seq + '<span class="ticker-dot">•</span>' + seq + '<span class="ticker-dot">•</span>';
  // iOS Safari sometimes doesn't start a CSS animation on an element that was
  // display:none when the animation was assigned (the ticker starts hidden until
  // login). Force a reflow to (re)start the scroll reliably -> no "empty band".
  track.style.animation = 'none';
  void track.offsetWidth; // reflow
  track.style.animation = '';
}

// === RENDER ===
function render() {
  let content = '';
  switch(currentTab) {
    case 'teams': content = renderTeamRanking(); break;
    case 'spotlight': content = renderSpotlight(); break;
    case 'golden': content = renderGoldenBoot(); break;
    case 'playmaker': content = renderPlaymaker(); break;
    case 'awards': content = renderSpecialAwards(); break;
    case 'var': content = renderVAR(); break;
    case 'position': content = renderMyPosition(); break;
    case 'vartime': content = isAdmin() ? renderVarTime() : renderTeamRanking(); break;
    case 'coach': content = isAdmin() ? renderCoachRoom() : renderTeamRanking(); break;
  }

  document.getElementById('app').innerHTML = `
    ${renderHero()}
    ${renderTabs()}
    ${renderIntroHint()}
    ${content}
    ${renderFooter()}
    ${renderTeamModal()}
    ${renderNationModal()}
    ${renderPlayerModal()}
    ${renderVarReviewModal()}
  `;

  // Keep the hardware/browser Back button in sync with open overlays so it
  // closes the current modal instead of leaving the app (mobile-friendly).
  syncOverlayHistory();

  // Update last update
  document.getElementById('last-update').textContent = `Last updated: ${formatDate(updated_at)} · ${period}`;
  updateCountdown();
  updateTicker();
  runAnimNums();
  flashRankChanges();

  // Count-up the spotlight stats on first view / tab change (not on background polls).
  if (!suppressAnim && currentTab === 'spotlight') animateCountUps();
  const copyBtn = document.getElementById('copy-commentary');
  if (copyBtn) copyBtn.addEventListener('click', copyCommentary);
  const cardBtn = document.getElementById('download-card');
  if (cardBtn) cardBtn.addEventListener('click', () => generatePlayerCard(cardPerson));
  const exportBtn = document.getElementById('export-standings');
  if (exportBtn) exportBtn.addEventListener('click', generateStandingsImage);
  document.querySelectorAll('.js-compare').forEach(btn => btn.addEventListener('click', openCompare));
  // Full-ranking toggle under Golden Boot / Playmaker (keep scroll position).
  document.querySelectorAll('[data-fullrank]').forEach(btn => btn.addEventListener('click', () => {
    const k = btn.dataset.fullrank; fullRankOpen[k] = !fullRankOpen[k];
    const y = window.scrollY; render(); window.scrollTo(0, y);
  }));
  // Any player element (match-sheet cards/rows, Players-view rows, VAR rows)
  // opens the SAME Panini-style player card — one consistent experience.
  document.querySelectorAll('[data-player]').forEach(el => el.addEventListener('click', () => {
    // If opened from inside the team/nation modal, remember it so closing the card
    // returns there (and close that modal so they don't stack).
    if (el.dataset.fromTeam && openTeamModal) { playerReturnToTeam = openTeamModal; openTeamModal = null; }
    else if (el.dataset.fromNation && openNationModal) { playerReturnToNation = openNationModal; openNationModal = null; }
    openPlayerModal = el.dataset.player;
    render();
    document.body.style.overflow = 'hidden';
  }));
  // Keyboard accessibility: the clickable rows/cards are <div>/<span>, so make them
  // focusable and let Enter/Space trigger the same click (one central pass, not 16
  // templates). Buttons/links are already accessible and skipped.
  document.querySelectorAll('[data-player],[data-team],[data-nteam],[data-nation]').forEach(el => {
    if (el.tagName === 'BUTTON' || el.tagName === 'A' || el.dataset.kbd) return;
    el.dataset.kbd = '1';
    el.tabIndex = 0;
    el.setAttribute('role', 'button');
    el.addEventListener('keydown', e => {
      if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); el.click(); }
    });
  });
  // Player modal: close + "view squad" link
  const pOverlay = document.getElementById('player-overlay');
  const closePlayer = () => {
    openPlayerModal = null;
    if (playerReturnToTeam) { openTeamModal = playerReturnToTeam; playerReturnToTeam = null; render(); }
    else if (playerReturnToNation) { openNationModal = playerReturnToNation; playerReturnToNation = null; render(); }
    else { document.body.style.overflow = ''; render(); }
  };
  const pClose = document.getElementById('player-close-btn');
  if (pClose) pClose.addEventListener('click', closePlayer);
  const pBack = document.getElementById('player-back-btn');
  if (pBack) pBack.addEventListener('click', closePlayer);
  if (pOverlay) pOverlay.addEventListener('click', e => { if (e.target === pOverlay) closePlayer(); });

  // VAR review modal: close, and verdict buttons (decide → animate → close).
  const vrOverlay = document.getElementById('vr-overlay');
  if (vrOverlay) {
    const closeVr = () => { varReviewName = null; document.body.style.overflow = ''; render(); };
    const vrClose = document.getElementById('vr-close-btn');
    if (vrClose) vrClose.addEventListener('click', closeVr);
    vrOverlay.addEventListener('click', e => { if (e.target === vrOverlay) closeVr(); });
    attachHolo(vrOverlay.querySelector('.pc-card'));
    bindDisciplineToggles(vrOverlay);
    bindHonourToggles(vrOverlay);
    bindCardOutsideClose(vrOverlay);
    vrOverlay.querySelectorAll('.vt-verdict[data-vrverdict]').forEach(btn => btn.addEventListener('click', () => {
      const verdict = btn.dataset.vrverdict;
      setVerdict(varReviewName, verdict);
      const reduce = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
      // Highlight the chosen verdict + a colour flash, then close the modal.
      vrOverlay.querySelectorAll('.vt-verdict').forEach(x => {
        x.classList.remove('on', 'pending', 'yellow', 'red', 'excused');
        if (x.dataset.vrverdict === verdict) x.classList.add('on', verdict);
      });
      const flash = document.getElementById('vr-flash');
      const modal = vrOverlay.querySelector('.vr-modal');
      if (flash && !reduce) { flash.className = 'vr-flash f-' + verdict; void flash.offsetWidth; flash.classList.add('go'); }
      if (modal && !reduce) { modal.classList.add('vr-decided'); }
      const delay = reduce ? 0 : 700;
      setTimeout(() => { varReviewName = null; document.body.style.overflow = ''; render(); }, delay);
    }));
  }
  const pTeamLink = document.querySelector('.pc-team-link[data-team]');
  if (pTeamLink) pTeamLink.addEventListener('click', () => {
    openPlayerModal = null; openTeamModal = pTeamLink.dataset.team; render(); document.body.style.overflow = 'hidden';
  });
  document.querySelectorAll('.pc-share[data-share]').forEach(pShare => pShare.addEventListener('click', () => {
    const person = people.find(p => p.name === pShare.dataset.share);
    if (!person) return;
    const orig = pShare.dataset.label || pShare.textContent;
    pShare.dataset.label = orig;
    pShare.textContent = '⏳ Preparing…';
    // Builds the card PNG and opens the native share sheet (image), falling back
    // to a link share / download inside shareCanvas.
    generatePlayerCard(person, 'share');
    setTimeout(() => { pShare.textContent = orig; }, 2200);
  }));
  // Stat boxes deep-link to that ranking tab (Golden Boot, Playmaker, Awards).
  document.querySelectorAll('.pc-stat-link[data-goto]').forEach(box => box.addEventListener('click', () => {
    const tab = box.dataset.goto;
    openPlayerModal = null; document.body.style.overflow = '';
    currentTab = tab; if (tab === 'teams') teamView = 'teams';
    setTabUrl(tab); render();
  }));
  // Holographic tilt on the player-modal card.
  attachHolo(document.querySelector('#player-overlay .pc-card'));
  bindDisciplineToggles(); // discipline badge → tap to reveal the VAR explanation
  bindHonourToggles();     // honour chips → tap to reveal what each one means
  bindCardOutsideClose();  // tap elsewhere in the card closes the popovers

  // VAR Room (public): country + entity + name filters, scoping cards and clean sheets.
  if (currentTab === 'var') {
    const reRender = () => { const y = window.scrollY; render(); window.scrollTo(0, y); };
    const vRegion = document.getElementById('var-region');
    if (vRegion) vRegion.addEventListener('change', e => { varRegion = e.target.value; varTeam = 'all'; reRender(); });
    const vTeam = document.getElementById('var-team');
    if (vTeam) vTeam.addEventListener('change', e => { varTeam = e.target.value; reRender(); });
    const vSearch = document.getElementById('var-search');
    if (vSearch) {
      const apply = debounce(() => {
        const y = window.scrollY; render(); window.scrollTo(0, y);
        const ni = document.getElementById('var-search');
        if (ni) { ni.focus(); ni.setSelectionRange(varSearch.length, varSearch.length); }
      }, 120);
      vSearch.addEventListener('input', e => { varSearch = e.target.value; apply(); });
    }
    const vClear = document.getElementById('var-clear');
    if (vClear) vClear.addEventListener('click', () => { varRegion = 'all'; varTeam = 'all'; varSearch = ''; reRender(); });
    // VAR rows carry data-player → the generic [data-player] handler opens the card.
  }

  // Admin VAR TIME: verdict buttons, filter, copy, reset (re-render, keep scroll)
  if (currentTab === 'vartime') {
    const reRender = () => { const y = window.scrollY; render(); window.scrollTo(0, y); };
    // Tap a card → open the player's card in the VAR review modal.
    document.querySelectorAll('[data-vtreview]').forEach(c => c.addEventListener('click', () => {
      varReviewName = c.dataset.vtreview;
      render();
      document.body.style.overflow = 'hidden';
    }));
    document.querySelectorAll('.vt-filter').forEach(btn => btn.addEventListener('click', () => {
      vartimeFilter = btn.dataset.f; reRender();
    }));
    const vtRegion = document.getElementById('vt-region');
    if (vtRegion) vtRegion.addEventListener('change', e => { vartimeRegion = e.target.value; vartimeTeam = 'all'; reRender(); });
    const vtTeam = document.getElementById('vt-team');
    if (vtTeam) vtTeam.addEventListener('change', e => { vartimeTeam = e.target.value; reRender(); });
    const vtSearch = document.getElementById('vt-search');
    if (vtSearch) {
      const apply = debounce(() => {
        const y = window.scrollY; render(); window.scrollTo(0, y);
        const ni = document.getElementById('vt-search');
        if (ni) { ni.focus(); ni.setSelectionRange(vartimeSearch.length, vartimeSearch.length); }
      }, 120);
      vtSearch.addEventListener('input', e => { vartimeSearch = e.target.value; apply(); });
    }
    const reset = document.getElementById('vt-reset');
    if (reset) reset.addEventListener('click', () => {
      if (confirm('Clear all VAR verdicts on this device?')) { safeRemove(VAR_KEY); reRender(); }
    });
    const copy = document.getElementById('vt-copy');
    if (copy) copy.addEventListener('click', () => {
      const b = varBreakers();
      const c = v => b.filter(x => x.verdict === v).length;
      const head = `🟥 VAR TIME — ${period || 'Sales Challenge'}\n${b.length} under review · ${c('pending')} pending · 🟨 ${c('yellow')} · 🟥 ${c('red')} · ✅ ${c('excused')}\n`;
      const lines = b.map(x => `${VERDICT_META[x.verdict].icon} ${x.p.name} (${x.p.team}) — ${x.reasons.join('; ')}`);
      const text = head + '\n' + lines.join('\n');
      navigator.clipboard?.writeText(text).then(() => {
        copy.textContent = '✓ Copied'; setTimeout(() => { copy.textContent = '📋 Copy review'; }, 1500);
      }).catch(() => {});
    });
  }

  // Admin COACH ROOM: filters, metric switch, copy summary, contributor → card.
  if (currentTab === 'coach') {
    const reRender = () => { const y = window.scrollY; render(); window.scrollTo(0, y); };
    const cRegion = document.getElementById('coach-region');
    if (cRegion) cRegion.addEventListener('change', e => { coachRegion = e.target.value; coachTeam = 'all'; reRender(); });
    const cTeam = document.getElementById('coach-team');
    if (cTeam) cTeam.addEventListener('change', e => { coachTeam = e.target.value; reRender(); });
    const cClear = document.getElementById('coach-clear');
    if (cClear) cClear.addEventListener('click', () => { coachRegion = 'all'; coachTeam = 'all'; reRender(); });
    document.querySelectorAll('.coach-metric').forEach(btn => btn.addEventListener('click', () => { coachMetric = btn.dataset.metric; reRender(); }));
    // Clickable KPI tiles → open the deep-dive modal (nations → entities →
    // players contribution to that metric, like the Team Ranking drill-down).
    const openDive = (metric) => { coachDive = { metric }; coachDiveRegion = null; render(); document.body.style.overflow = 'hidden'; };
    document.querySelectorAll('.coach-kpi-click[data-kpi], .coach-disc-click[data-kpi]').forEach(t => {
      t.addEventListener('click', () => openDive(t.dataset.kpi));
      t.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); openDive(t.dataset.kpi); } });
    });
    // Deep-dive modal interactions.
    const cdOverlay = document.getElementById('cd-overlay');
    if (cdOverlay) {
      const closeDive = () => { coachDive = null; coachDiveRegion = null; document.body.style.overflow = ''; render(); };
      cdOverlay.addEventListener('click', e => { if (e.target === cdOverlay) closeDive(); });
      const x = document.getElementById('cd-close'); if (x) x.addEventListener('click', closeDive);
      const back = document.getElementById('cd-back'); if (back) back.addEventListener('click', () => { coachDiveRegion = null; render(); });
      cdOverlay.querySelectorAll('[data-cd-region]').forEach(r => r.addEventListener('click', () => { coachDiveRegion = r.dataset.cdRegion; render(); }));
      // Entity rows → open that team's page (squad + contributors), closing the
      // dive so the modals don't stack; the team modal has its own drill-down.
      cdOverlay.querySelectorAll('[data-cd-team]').forEach(tr => tr.addEventListener('click', () => {
        coachDive = null; coachDiveRegion = null;
        openTeamModal = tr.dataset.cdTeam; render(); document.body.style.overflow = 'hidden';
      }));
      // Player rows inside the dive open that player's card (over the dive).
      cdOverlay.querySelectorAll('[data-player]').forEach(pr => pr.addEventListener('click', () => {
        openPlayerModal = pr.dataset.player; render(); document.body.style.overflow = 'hidden';
      }));
    }
    const cCopy = document.getElementById('coach-copy');
    if (cCopy) cCopy.addEventListener('click', () => {
      const sc = people.filter(p => (coachRegion === 'all' || regionOf(p.team) === coachRegion) && (coachTeam === 'all' || p.team === coachTeam));
      const s = k => sc.reduce((a, p) => a + (Number(p[k]) || 0), 0);
      const hc = sc.length, gmE = sc.reduce((a, p) => a + (Number(p.ps_total) || 0) * (Number(p.ps_total_gm) || 0), 0);
      const scope = coachTeam !== 'all' ? coachTeam : (coachRegion !== 'all' ? (VT_REGION_LABELS[coachRegion] || coachRegion) : 'All teams');
      const text = `📋 COACH ROOM — ${period || 'Sales Challenge'} · ${scope}\n`
        + `Total PS: ${fmtMoney(s('ps_total'))} · New Business: ${fmtMoney(s('ps_nb'))}\n`
        + `Avg GM: ${fmtPct(s('ps_total') ? gmE / s('ps_total') : 0)} · Avg meetings/wk: ${fmtNum(hc ? s('meetings') / hc : 0)}\n`
        + `Opportunities: ${Math.round(s('opps'))} · Licence GM: ${fmtMoney(s('licence_gm'))}\n`
        + `${hc} people · ${new Set(sc.map(p => p.team)).size} teams`;
      navigator.clipboard?.writeText(text).then(() => {
        cCopy.textContent = '✓ Copied'; setTimeout(() => { cCopy.textContent = '📋 Copy summary'; }, 1500);
      }).catch(() => {});
    });
    // Photo coverage: copy the missing-photo list + click a missing name → card.
    const covCopy = document.getElementById('cov-copy');
    if (covCopy) covCopy.addEventListener('click', () => {
      const sc = people.filter(p => (coachRegion === 'all' || regionOf(p.team) === coachRegion) && (coachTeam === 'all' || p.team === coachTeam));
      const miss = sc.filter(p => !photoFor(p.name)).sort((a, b) => String(a.team).localeCompare(String(b.team)) || String(a.name).localeCompare(String(b.name)));
      const text = `Missing card photos (${miss.length}):\n` + miss.map(p => `- ${p.name} (${p.team})`).join('\n');
      navigator.clipboard?.writeText(text).then(() => {
        covCopy.textContent = '✓ Copied'; setTimeout(() => { covCopy.textContent = '📋 Copy missing list'; }, 1500);
      }).catch(() => {});
    });
    document.querySelectorAll('.cov-miss[data-player]').forEach(el => el.addEventListener('click', () => {
      openPlayerModal = el.dataset.player; render(); document.body.style.overflow = 'hidden';
    }));
  }

  // First-visit hint: dismiss + remember.
  const introX = document.getElementById('intro-hint-x');
  if (introX) introX.addEventListener('click', () => {
    safeSet(INTRO_KEY, '1');
    const h = document.getElementById('intro-hint');
    if (h) { h.classList.add('intro-hint-out'); setTimeout(() => h.remove(), 250); }
  });

  // Bind events
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const changed = currentTab !== btn.dataset.tab;
      currentTab = btn.dataset.tab;
      if (currentTab !== 'teams') currentSearch = '';
      if (currentTab !== 'position') positionQuery = '';
      setTabUrl(currentTab);
      render();
      if (changed) {
        // Bring the new tab's content into view (so you don't stay stranded at
        // the bottom of the previous list) and play a quick enter transition.
        const sec = document.querySelector('#app .section');
        if (sec) {
          const tb = document.querySelector('.tabs-wrap');
          const y = sec.getBoundingClientRect().top + window.scrollY - ((tb ? tb.offsetHeight : 0) + 8);
          if (window.scrollY > y) window.scrollTo({ top: Math.max(0, y), behavior: 'smooth' });
          if (!(window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches)) {
            sec.classList.remove('tab-enter'); void sec.offsetWidth; sec.classList.add('tab-enter');
          }
        }
      }
    });
  });
  // Keep the active tab visible: on narrow screens the tab bar scrolls
  // horizontally, so centre the selected tab (e.g. "My Position" on a tablet
  // wouldn't otherwise be visible as selected).
  const tabsBar = document.querySelector('.tabs-bar');
  const activeTab = tabsBar && tabsBar.querySelector('.tab-btn.active');
  if (tabsBar && activeTab) {
    const target = activeTab.offsetLeft - (tabsBar.clientWidth - activeTab.offsetWidth) / 2;
    tabsBar.scrollLeft = Math.max(0, target);
  }
  // Show/hide the left & right scroll-fade hints on the tab bar.
  const tabsWrap = document.querySelector('.tabs-wrap');
  if (tabsBar && tabsWrap) {
    const updateFades = () => {
      const maxScroll = tabsBar.scrollWidth - tabsBar.clientWidth;
      tabsWrap.classList.toggle('can-left', tabsBar.scrollLeft > 4);
      // 0.92 absorbs the trailing padding/rounding so the right fade clears at the end.
      tabsWrap.classList.toggle('can-right', tabsBar.scrollLeft < maxScroll * 0.92 - 1);
    };
    tabsBar.addEventListener('scroll', updateFades, { passive: true }); // element is recreated each render, no leak
    updateFades();
  }

  // Sortable team-table headers
  document.querySelectorAll('.th-sort').forEach(h => {
    h.addEventListener('click', () => {
      const k = h.dataset.sort;
      if (teamSort.key === k) teamSort.dir = teamSort.dir === 'asc' ? 'desc' : 'asc';
      else teamSort = { key: k, dir: k === 'country' ? 'asc' : 'desc' };
      render();
    });
  });
  // Players view: sortable columns
  document.querySelectorAll('.th-psort').forEach(h => {
    h.addEventListener('click', () => {
      const k = h.dataset.psort;
      if (playerSort.key === k) playerSort.dir = playerSort.dir === 'asc' ? 'desc' : 'asc';
      else playerSort = { key: k, dir: k === 'name' ? 'asc' : 'desc' };
      render();
    });
  });
  // Nations view: sortable columns (rank/medal stays the official avg-PS standing)
  document.querySelectorAll('.th-nsort').forEach(h => {
    h.addEventListener('click', () => {
      const k = h.dataset.nsort;
      if (nationSort.key === k) nationSort.dir = nationSort.dir === 'asc' ? 'desc' : 'asc';
      else nationSort = { key: k, dir: k === 'label' ? 'asc' : 'desc' };
      render();
    });
  });
  // Players view rows carry data-player → handled by the generic [data-player] binding.
  // Team region filter chips
  document.querySelectorAll('.region-chip').forEach(c => {
    c.addEventListener('click', () => { teamRegion = c.dataset.region; render(); });
  });
  document.querySelectorAll('.view-toggle button[data-view]').forEach(btn => {
    btn.addEventListener('click', () => { teamView = btn.dataset.view; try { safeSet('devoteam_wc_teamview_v1', teamView); } catch (e) {} render(); });
  });

  const teamSearch = document.getElementById('team-search');
  if (teamSearch) {
    const apply = debounce(() => {
      render();
      const newInput = document.getElementById('team-search');
      if (newInput) {
        newInput.focus();
        newInput.setSelectionRange(currentSearch.length, currentSearch.length);
      }
    }, 120);
    teamSearch.addEventListener('input', e => { currentSearch = e.target.value; apply(); });
  }

  const posSearch = document.getElementById('position-search');
  if (posSearch) {
    const apply = debounce(() => {
      render();
      const newInput = document.getElementById('position-search');
      if (newInput) {
        newInput.focus();
        newInput.setSelectionRange(positionQuery.length, positionQuery.length);
      }
    }, 120);
    posSearch.addEventListener('input', e => { positionQuery = e.target.value; apply(); });
  }
  // Holographic tilt on the My Position card.
  if (currentTab === 'position') attachHolo(document.querySelector('.position-card-wrap .pc-card'));

  document.querySelectorAll('.suggestion-item').forEach(item => {
    item.addEventListener('click', () => {
      positionQuery = item.dataset.name;
      render();
    });
  });

  // Click sur une row d'équipe → ouvre modal
  document.querySelectorAll('.teams-table-row[data-team]').forEach(row => {
    row.addEventListener('click', () => {
      openTeamModal = row.dataset.team;
      render();
      // Bloque le scroll du body quand modal ouvert
      document.body.style.overflow = 'hidden';
    });
  });

  // Hero podium cards → open the team's squad
  document.querySelectorAll('.podium-card[data-team]').forEach(card => {
    card.addEventListener('click', () => {
      openTeamModal = card.dataset.team;
      render();
      document.body.style.overflow = 'hidden';
    });
  });

  // Click sur une row de nation → ouvre le drilldown nation
  document.querySelectorAll('.nation-row-click[data-nation]').forEach(row => {
    row.addEventListener('click', () => {
      openNationModal = row.dataset.nation;
      render();
      document.body.style.overflow = 'hidden';
    });
  });

  // Inside the nation modal, clicking a team drills down to that team's squad
  // and remembers the nation, so closing the team modal returns to the nation.
  document.querySelectorAll('.nation-team-row[data-nteam]').forEach(row => {
    row.addEventListener('click', () => {
      nationReturnTo = openNationModal;
      openNationModal = null;
      openTeamModal = row.dataset.nteam;
      render();
      document.body.style.overflow = 'hidden';
    });

  // Fermeture du modal équipe (retour à la nation si on venait de là)
  const closeBtn = document.getElementById('modal-close-btn');

    nationReturnTo = null;

// Discipline badge: tap to reveal the explanation popover. Bound directly (not
// delegated) because the card containers call event.stopPropagation(), which
// would swallow a document-level click. bindDisciplineToggles() is called from
// every place the card is shown (modal, My Position, TV overlay).
function bindDisciplineToggles(root) {
  (root || document).querySelectorAll('[data-discipline]').forEach(btn => {
    if (btn.dataset.bound) return;
    btn.dataset.bound = '1';
    btn.addEventListener('click', () => {
      const pop = btn.parentElement.querySelector('.pc-discipline-pop');
      if (!pop) return;
      const open = pop.hidden;
      pop.hidden = !open;
      btn.setAttribute('aria-expanded', String(open));
    });
  });
}

// Honour chips: tap to reveal what the achievement means (the hover title is
// useless on touch). The explanation shows in a shared popover under the row;
// tapping the same chip again hides it.
function bindHonourToggles(root) {
  (root || document).querySelectorAll('.pc-honour[data-honour]').forEach(btn => {
    if (btn.dataset.bound) return;
    btn.dataset.bound = '1';
    btn.addEventListener('click', () => {
      const row = btn.parentElement;
      const pop = row.parentElement.querySelector('.pc-honour-pop');
      if (!pop) return;
      const same = btn.classList.contains('on') && !pop.hidden;
      row.querySelectorAll('.pc-honour').forEach(x => { x.classList.remove('on'); x.setAttribute('aria-expanded', 'false'); });
      if (same) { pop.hidden = true; return; }
      pop.textContent = btn.dataset.honour;
      pop.hidden = false;
      btn.classList.add('on');
      btn.setAttribute('aria-expanded', 'true');
    });
  });
}

// Close any open honour / discipline popover (and deselect its chip). Used when
// the user taps elsewhere inside the card.
function closeCardPopovers(scope) {
  (scope || document).querySelectorAll('.pc-honour-pop:not([hidden])').forEach(pop => { pop.hidden = true; });
  (scope || document).querySelectorAll('.pc-honour.on').forEach(c => { c.classList.remove('on'); c.setAttribute('aria-expanded', 'false'); });
  (scope || document).querySelectorAll('.pc-discipline-pop:not([hidden])').forEach(pop => {
    pop.hidden = true;
    const btn = pop.parentElement && pop.parentElement.querySelector('[data-discipline]');
    if (btn) btn.setAttribute('aria-expanded', 'false');
  });
}
// A click anywhere inside the card that isn't on a toggle chip closes the popovers.
function bindCardOutsideClose(root) {
  (root || document).querySelectorAll('.pc-modal, .position-result').forEach(c => {
    if (c.dataset.outclose) return;
    c.dataset.outclose = '1';
    c.addEventListener('click', e => {
      if (e.target.closest('.pc-honour, .pc-discipline, .pc-honour-pop, .pc-discipline-pop')) return;
      closeCardPopovers(c);
    });
  });
}

// === Back-button / overlay history ===
// On a phone, the browser/hardware Back button should dismiss whatever modal is
// open (player card, team squad, nation drilldown, VAR review, coach dive)
// instead of leaving the platform. We keep a single history "guard" entry while
// any overlay is open; it re-arms itself so each Back press peels one layer.
let overlayGuardArmed = false;

function anyOverlayOpen() {
  return !!(varReviewName || openPlayerModal || coachDive || openTeamModal || openNationModal);
}

// Close exactly the top-most overlay layer (mirrors the Escape handler order).
function closeTopLayer() {
  if (varReviewName) { varReviewName = null; document.body.style.overflow = ''; render(); return; }
  if (openPlayerModal) {
    openPlayerModal = null;
    if (playerReturnToTeam) { openTeamModal = playerReturnToTeam; playerReturnToTeam = null; }
    else if (playerReturnToNation) { openNationModal = playerReturnToNation; playerReturnToNation = null; }
    else if (coachDive) { /* card was opened over the coach dive → keep the dive */ }
    else { document.body.style.overflow = ''; }
    render(); return;
  }
  if (coachDive) {
    if (coachDiveRegion) { coachDiveRegion = null; render(); return; } // step back one level first
    coachDive = null; document.body.style.overflow = ''; render(); return;
  }
  if (openTeamModal || openNationModal) {
    if (openTeamModal && nationReturnTo) { openTeamModal = null; openNationModal = nationReturnTo; nationReturnTo = null; }
    else { openTeamModal = null; openNationModal = null; nationReturnTo = null; document.body.style.overflow = ''; }
    render(); return;
  }
}

// Push one guard entry while any overlay is open. It re-arms itself on each Back
// so successive presses peel one layer at a time without leaving the app.
function syncOverlayHistory() {
  if (tvMode) return; // TV projection manages its own navigation
  if (anyOverlayOpen() && !overlayGuardArmed) {
    try { history.pushState({ wcOverlay: 1 }, ''); } catch (e) {}
    overlayGuardArmed = true;
  }
}

window.addEventListener('popstate', () => {
  if (tvMode) return;
  if (anyOverlayOpen()) {
    overlayGuardArmed = false; // the guard we pushed was just consumed by Back
    closeTopLayer();           // render() re-arms a guard if a layer remains
  } else if (overlayGuardArmed) {
    // A modal was dismissed via its on-screen button, leaving a spent guard.
    // Absorb this Back silently (stay on the page) rather than exiting.
    overlayGuardArmed = false;
  }
});

// Keyboard: in TV mode, ← / → switch panels and Esc exits; otherwise Esc closes
// the team modal.
document.addEventListener('keydown', e => {
  if (tvMode) {
    // If a player card is open over the projection, Esc closes just the card.
    if (e.key === 'Escape' && document.getElementById('tv-player-overlay')) { closeTVPlayerCard(); return; }
    if (e.key === 'ArrowRight') { tvGo(1); return; }
    if (e.key === 'ArrowLeft') { tvGo(-1); return; }
    if (e.key === 'Escape') { exitTV(); return; }
    return;
  }
  if (e.key === 'Escape' && varReviewName) {
    varReviewName = null; document.body.style.overflow = ''; render(); return;
  }
  if (e.key === 'Escape' && openPlayerModal) {
    openPlayerModal = null;
    if (playerReturnToTeam) { openTeamModal = playerReturnToTeam; playerReturnToTeam = null; }
    else if (playerReturnToNation) { openNationModal = playerReturnToNation; playerReturnToNation = null; }
    else if (coachDive) { /* card was opened over the dive → keep the dive open */ }
    else { document.body.style.overflow = ''; }
    render(); return;
  }
  if (e.key === 'Escape' && coachDive) {
    if (coachDiveRegion) { coachDiveRegion = null; render(); return; } // step back a level first
    coachDive = null; document.body.style.overflow = ''; render(); return;
  }
  if (e.key === 'Escape' && (openTeamModal || openNationModal)) {
    if (openTeamModal && nationReturnTo) { openTeamModal = null; openNationModal = nationReturnTo; nationReturnTo = null; }
    else { openTeamModal = null; openNationModal = null; nationReturnTo = null; document.body.style.overflow = ''; }
    render();
  }
});

// Touch swipe to switch TV panels.
let tvTouchX = null, tvTouchY = null;
document.addEventListener('touchstart', e => {
  if (tvMode && e.touches[0]) { tvTouchX = e.touches[0].clientX; tvTouchY = e.touches[0].clientY; }
}, { passive: true });
document.addEventListener('touchend', e => {
  if (!tvMode || tvTouchX === null) return;
  const dx = e.changedTouches[0].clientX - tvTouchX;
  const dy = e.changedTouches[0].clientY - tvTouchY;
  tvTouchX = tvTouchY = null;
  if (Math.abs(dx) > 50 && Math.abs(dx) > Math.abs(dy)) tvGo(dx < 0 ? 1 : -1); // horizontal swipe only
}, { passive: true });


// === LIVE: authentication ===
// Safe localStorage wrappers — some in-app webviews block storage and throw.
function safeGet(k) { try { return localStorage.getItem(k); } catch (e) { return null; } }
function safeSet(k, v) { try { localStorage.setItem(k, v); } catch (e) {} }
function safeRemove(k) { try { localStorage.removeItem(k); } catch (e) {} }

function isLoggedIn() {
  return safeGet(CONFIG.SESSION_KEY) === '1';
}

function logout() {
  safeRemove(CONFIG.SESSION_KEY);
  safeRemove(CONFIG.PWD_KEY);
  location.reload();
}

// === Dark mode ===
const THEME_KEY = 'devoteam_wc_theme_v1';
function applyTheme(theme) {
  const dark = theme === 'dark';
  document.documentElement.dataset.theme = dark ? 'dark' : '';
  const btn = document.getElementById('theme-btn');
  if (btn) { btn.textContent = dark ? '☀️' : '🌙'; btn.title = dark ? 'Switch to light mode' : 'Switch to dark mode'; }
  const meta = document.querySelector('meta[name="theme-color"]');
  if (meta) meta.setAttribute('content', dark ? '#0E1322' : '#1E2A78');
}
function currentTheme() {
  const saved = safeGet(THEME_KEY);
  if (saved === 'dark' || saved === 'light') return saved; // manual choice always wins
  // No manual pref: dark in the evening/night (after 19h or before 7h) — nice
  // "ceremony" ambiance — otherwise follow the OS preference.
  const h = new Date().getHours();
  if (h >= 19 || h < 7) return 'dark';
  return (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) ? 'dark' : 'light';
}
function toggleTheme() {
  const next = document.documentElement.dataset.theme === 'dark' ? 'light' : 'dark';
  safeSet(THEME_KEY, next);
  applyTheme(next);
}

// === LIVE: admin (manual-refresh) gating ===
function isAdmin() {
  return safeGet(CONFIG.ADMIN_FLAG) === '1';
}

// Activate/deactivate admin mode from ?admin=<key> (or ?admin=off), then strip
// the param from the URL so it isn't bookmarked or shared.
function checkAdminParam() {
  try {
    const params = new URLSearchParams(location.search);
    if (!params.has('admin')) return;
    const val = params.get('admin');
    if (val === CONFIG.ADMIN_KEY) safeSet(CONFIG.ADMIN_FLAG, '1');
    else if (val === 'off') safeRemove(CONFIG.ADMIN_FLAG);
    params.delete('admin');
    const qs = params.toString();
    history.replaceState(null, '', location.pathname + (qs ? '?' + qs : '') + location.hash);
  } catch (e) {}
}

// Show the refresh button only for admins.
function applyAdminVisibility() {
  const btn = document.getElementById('refresh-btn');
  if (btn) btn.style.display = isAdmin() ? 'flex' : 'none';
}

async function attemptLogin(password) {
  try {
    // One round-trip: request the data directly with the password. A successful
    // payload means the code is correct AND we already have the data — no second
    // call. (Previously this verified the password, then init() fetched the data
    // separately: two sequential Apps Script cold starts = a slow first login.)
    const ctrl = (typeof AbortController !== 'undefined') ? new AbortController() : null;
    const timer = ctrl ? setTimeout(() => ctrl.abort(), CONFIG.FETCH_TIMEOUT_MS) : null;
    let data;
    try {
      const res = await fetch(CONFIG.APPS_SCRIPT_URL, {
        method: 'POST',
        cache: 'no-store',
        // text/plain avoids a CORS preflight against Apps Script.
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify({ action: 'data', password }),
        signal: ctrl ? ctrl.signal : undefined
      });
      data = await res.json();
    } finally {
      if (timer) clearTimeout(timer);
    }
    if (data && data.error === 'unauthorized') return false; // wrong access code
    if (!data || data.error || !Array.isArray(data.teams)) return null; // back-end issue
    // Correct code: persist the session and prime the cache so init() paints
    // instantly from this payload (no extra fetch on the way in).
    safeSet(CONFIG.SESSION_KEY, '1');
    safeSet(CONFIG.PWD_KEY, password); // needed to authorize each data request
    cacheSnapshot(data);
    return true;
  } catch (err) {
    console.error('Login failed:', err);
    return null; // null = network/back-end error (distinct from wrong password)
  }
}

// Wake the Apps Script instance early (it can take several seconds to spin up
// when idle). Fired while the login screen is shown so the cold start overlaps
// with the user typing, instead of stacking onto the first real request.
let prewarmed = false;
function prewarmBackend() {
  if (prewarmed) return;
  prewarmed = true;
  try { fetch(CONFIG.APPS_SCRIPT_URL + '?action=ping', { cache: 'no-store' }).catch(() => {}); }
  catch (e) {}
}

// Kick-off! When data is ready, the ball is struck and rockets off the pitch,
// the loader fades, and the app takes its place. Resolves when the ball is gone.
function playKickoff() {
  return new Promise(resolve => {
    const screen = document.querySelector('.loader-screen');
    const reduce = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    if (!screen || reduce) { resolve(); return; }
    const ball = screen.querySelector('.loader-ball');
    const shadow = screen.querySelector('.loader-ball-shadow');
    const sub = screen.querySelector('.loader-sub');
    if (sub) sub.textContent = 'Kick-off! ⚽';
    if (ball) ball.classList.add('kicked');
    if (shadow) shadow.classList.add('kicked');
    setTimeout(() => screen.classList.add('kicked'), 230); // fade the pitch out behind the ball
    setTimeout(resolve, 620);
  });
}

// === Weekly recap modal ("what changed since last update") ===
function digestRow(emoji, html) {
  return `<div class="digest-row"><span class="digest-emoji">${emoji}</span><span>${html}</span></div>`;
}
function openDigest() {
  if (document.getElementById('digest-overlay')) return;
  markDigestSeen();
  const d = weekDigest;
  let body;
  if (!d || !d.count) {
    body = `<div class="digest-empty">No weekly changes to show yet.<br/>The recap fills in once a new weekly update lands. Check back after the next data drop! ⚽</div>`;
  } else {
    const sections = [];
    if (d.newLeaders.length) sections.push(`
      <div class="digest-section">
        <h3 class="digest-h">🚨 New leaders</h3>
        ${d.newLeaders.map(l => digestRow(l.icon, `<b>${escapeHtml(l.who)}</b> tops the <b>${l.label}</b>`)).join('')}
      </div>`);
    if (d.climbers.length) sections.push(`
      <div class="digest-section">
        <h3 class="digest-h">📈 Biggest climbers <span class="digest-sub">PS Total rank</span></h3>
        ${d.climbers.map(c => digestRow('▲', `<b data-jump="${c.name}" class="digest-name">${escapeHtml(c.name)}</b> <em>${escapeHtml(c.team)}</em> — up <b>${c.jump}</b> (#${c.from}→#${c.to})`)).join('')}
      </div>`);
    if (d.newTop10.length) sections.push(`
      <div class="digest-section">
        <h3 class="digest-h">⭐ New in the Top 10 <span class="digest-sub">PS Total</span></h3>
        ${d.newTop10.map(x => digestRow('🔟', `<b data-jump="${x.name}" class="digest-name">${escapeHtml(x.name)}</b> <em>${escapeHtml(x.team)}</em> — now #${x.rank}`)).join('')}
      </div>`);
    if (d.newCards.length) sections.push(`
      <div class="digest-section">
        <h3 class="digest-h">🟨 New yellow cards</h3>
        ${d.newCards.map(c => digestRow('🟨', `<b data-jump="${c.name}" class="digest-name">${escapeHtml(c.name)}</b> <em>${escapeHtml(c.team)}</em>`)).join('')}
      </div>`);
    body = sections.join('');
  }
  const el = document.createElement('div');
  el.className = 'modal-overlay';
  el.id = 'digest-overlay';
  el.innerHTML = `
    <div class="modal digest-modal" onclick="event.stopPropagation()">
      <div class="modal-header">
        <div class="modal-title-block">
          <h2 class="modal-title">📰 THIS WEEK'S RECAP</h2>
          <div class="modal-subtitle">${d && d.prevPeriod ? `Since ${escapeHtml(d.prevPeriod)}` : 'What changed in the standings'}${period ? ' · now ' + escapeHtml(period) : ''}</div>
        </div>
        <button class="modal-close" id="digest-close" aria-label="Close">×</button>
      </div>
      <div class="modal-body digest-body">${body}</div>
    </div>`;
  document.body.appendChild(el);
  document.body.style.overflow = 'hidden';
  const close = () => { el.remove(); document.body.style.overflow = ''; document.removeEventListener('keydown', onKey); };
  const onKey = e => { if (e.key === 'Escape') close(); };
  el.addEventListener('click', e => { if (e.target === el) close(); });
  el.querySelector('#digest-close').addEventListener('click', close);
  document.addEventListener('keydown', onKey);
  // Tap a name → open that player's card.
  el.querySelectorAll('.digest-name[data-jump]').forEach(n => n.addEventListener('click', () => {
    close(); openPlayerModal = n.dataset.jump; render(); document.body.style.overflow = 'hidden';
  }));
}

// Show the 📰 button (with a notification dot) only when a digest exists and the
// user hasn't opened this period's recap yet.
function digestSeenKey() { return 'devoteam_wc_digestseen_' + (weekDigest && weekDigest.period ? weekDigest.period : ''); }
function isDigestSeen() { try { return safeGet(digestSeenKey()) === '1'; } catch (e) { return false; } }
function markDigestSeen() { try { safeSet(digestSeenKey(), '1'); } catch (e) {} const dot = document.getElementById('digest-dot'); if (dot) dot.style.display = 'none'; }
function applyDigestVisibility() {
  const btn = document.getElementById('digest-btn');
  if (!btn) return;
  const has = !!(weekDigest && weekDigest.count);
  btn.style.display = has ? 'flex' : 'none';
  const dot = document.getElementById('digest-dot');
  if (dot) dot.style.display = (has && !isDigestSeen()) ? 'block' : 'none';

// === Rules & Awards modal (self-contained overlay) ===
