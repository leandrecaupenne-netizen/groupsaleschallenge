name: UX tests

# Re-runs the headless browser tests on every PR and on pushes to main, so a
# regression is caught even when code is pushed from outside a dev machine (the
# local pre-push hook only protects local pushes).

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch: {}

permissions:
  contents: write        # commit comments on push
  pull-requests: write   # PR comments

jobs:
  ux:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Playwright + Chromium
        run: |
          npm init -y
          npm install --no-save playwright@1.56.1
          npx playwright@1.56.1 install --with-deps chromium

      - name: UX smoke test (core + CTA + responsive)
        run: node test/ux-smoke.cjs

      - name: Deep UX e2e (admin, TV, share, ticker, compare, dark, mobile)
        run: node test/ux-e2e.cjs

      - name: Comment on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const run = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = [
              `❌ **UX tests failed** on \`${context.sha.slice(0, 7)}\`.`,
              ``,
              `→ Run details: ${run}`,
              ``,
              `Reproduce locally: \`node test/ux-smoke.cjs\` and \`node test/ux-e2e.cjs\`.`,
            ].join('\n');
            try {
              if (context.eventName === 'pull_request' && context.issue.number) {
                await github.rest.issues.createComment({ owner: context.repo.owner, repo: context.repo.repo, issue_number: context.issue.number, body });
              } else {
                await github.rest.repos.createCommitComment({ owner: context.repo.owner, repo: context.repo.repo, commit_sha: context.sha, body });
              }
            } catch (e) { core.warning('Could not post failure comment: ' + e.message); }
