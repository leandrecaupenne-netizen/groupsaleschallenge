// === VAR Room (yellow cards) ===
function renderVAR() {
  const CAP = 12;
  // Same filters as elsewhere: country (region) + entity (team) + name search.
  // They scope the cards AND the clean sheet together.
  const regionsPresent = VT_REGION_ORDER.filter(r => people.some(p => regionOf(p.team) === r));
  const teamsPresent = [...new Set(people
    .filter(p => varRegion === 'all' || regionOf(p.team) === varRegion)
    .map(p => p.team))].sort();
  const q = varSearch.trim().toLowerCase();
  const filtersActive = varRegion !== 'all' || varTeam !== 'all' || !!q;
  const match = p => (varRegion === 'all' || regionOf(p.team) === varRegion) &&
    (varTeam === 'all' || p.team === varTeam) &&
    (!q || p.name.toLowerCase().includes(q));
  const pool = people.filter(match);

  const lowMeet = pool.filter(p => p.yellow_meetings).sort((a, b) => (a.meetings || 0) - (b.meetings || 0));
  const lowGm = pool.filter(p => p.yellow_gm).sort((a, b) => (a.ps_total_gm || 0) - (b.ps_total_gm || 0));
  const names = new Set(); lowMeet.forEach(p => names.add(p.name)); lowGm.forEach(p => names.add(p.name));
  // Clean Sheet: players respecting every rule (no cards) — the positive side of the VAR.
  const clean = pool.filter(p => !p.yellow_meetings && !p.yellow_gm && ((p.ps_total || 0) > 0 || (p.ps_nb || 0) > 0));

  const filterBar = `
    <div class="vt-controls">
      <input type="text" id="var-search" class="search-input vt-search" placeholder="Search a player by name…" value="${escapeHtml(varSearch)}" />
      <select id="var-region" class="vt-select" aria-label="Filter by country">
        <option value="all">🌐 All countries</option>
        ${regionsPresent.map(r => `<option value="${r}" ${varRegion === r ? 'selected' : ''}>${VT_REGION_LABELS[r] || r}</option>`).join('')}
      </select>
      <select id="var-team" class="vt-select" aria-label="Filter by entity">
        <option value="all">🏢 All entities</option>
        ${teamsPresent.map(tm => `<option value="${escapeHtml(tm)}" ${varTeam === tm ? 'selected' : ''}>${escapeHtml(tm)}</option>`).join('')}
      </select>
      ${filtersActive ? `<button id="var-clear" class="vt-reset" title="Clear filters">↺ Clear</button>` : ''}
    </div>`;

  const row = (p, val, icon, cls) => `
    <div class="var-row var-click ${cls || ''}" data-team="${escapeHtml(p.team)}" title="View ${escapeHtml(p.team)} squad">
      <span class="var-card">${icon}</span>
      <span class="var-name">${escapeHtml(p.name)}<em>${escapeHtml(p.team)}</em></span>
      <span class="var-val">${val}</span>
    </div>`;
  const col = (title, list, valFn, emptyMsg, opts) => {
    opts = opts || {};
    const more = list.length > CAP
      ? `<div class="var-more">${opts.moreText ? opts.moreText(list.length - CAP) : '+ ' + (list.length - CAP) + ' more'}</div>`
      : '';
    return `
    <div class="var-col ${opts.cls || ''}">
      <div class="var-col-title">${title} <span class="var-col-count">${list.length}</span></div>
      ${opts.sub ? `<div class="var-col-sub">${opts.sub}</div>` : ''}
      ${list.length
        ? list.slice(0, CAP).map(p => row(p, valFn(p), opts.icon || '🟨', opts.rowCls)).join('') + more
        : `<div class="no-result">${emptyMsg}</div>`}
    </div>`;
  };

  const cleanSorted = [...clean].sort((a, b) => (b.ps_nb || 0) - (a.ps_nb || 0));

  return `
    <div class="section">
      <div class="section-header">
        <h2 class="section-title">${t('var.title')}</h2>
        <p class="section-subtitle">${t('var.sub', { n: names.size, s: names.size === 1 ? '' : 's' })} · 🧤 ${clean.length} playing by the rules${filtersActive ? ' · filtered' : ''}</p>
      </div>
      ${filterBar}
      <div class="var-grid var-grid-3">
        ${col(t('var.low'), lowMeet, p => `${fmtNum(p.meetings)} meet/wk`,
          filtersActive ? 'Nobody here for this filter. ✅' : "Everyone's hitting their meetings. ✅",
          { icon: '🟨', sub: 'Not following — under 5 meetings / week' })}
        ${col(t('var.gm'), lowGm, p => `GM ${fmtPct(p.ps_total_gm)}`,
          filtersActive ? 'Nobody here for this filter. ✅' : 'Margins are healthy. ✅',
          { icon: '🟨', sub: 'Not following — Gross Margin below 25%' })}
        ${col('🧤 Clean Sheet — Fair Play', cleanSorted, p => fmtMoney(p.ps_nb),
          filtersActive ? 'No clean sheets match this filter.' : 'No clean sheets yet — everyone has a card.',
          { cls: 'var-col-clean', icon: '✅', rowCls: 'var-row-clean',
            sub: 'Following — 5+ meetings / week and GM ≥ 25%',
            moreText: n => `+ ${n} more playing by the rules` })}
      </div>
    </div>
  `;
}

// === Admin "VAR TIME": Friday review of rule-breakers + verdicts ===
// Decisions are stored locally on the admin's device (data from the Sheet is
// read-only) — perfect as animation notes for the weekly VAR session.
const VAR_KEY = 'devoteam_wc_var_verdicts_v1';
const VERDICT_META = {
  pending: { icon: '⏳', label: 'Pending' },
  yellow:  { icon: '🟨', label: 'Yellow' },
  red:     { icon: '🟥', label: 'Red' },
  excused: { icon: '✅', label: 'Excused' }
};
function getVerdicts() { try { return JSON.parse(safeGet(VAR_KEY) || '{}'); } catch { return {}; } }
function setVerdict(name, verdict) {
  const v = getVerdicts();
  if (verdict === 'pending') delete v[name]; else v[name] = { verdict, ts: Date.now() };
  safeSet(VAR_KEY, JSON.stringify(v));
}
function varBreakers() {
  const verdicts = getVerdicts();
  return people.filter(p => p.yellow_meetings || p.yellow_gm).map(p => {
    const reasons = [];
    if (p.yellow_meetings) reasons.push(`${fmtNum(p.meetings)} meetings/wk (needs 5)`);
    if (p.yellow_gm) reasons.push(`GM ${fmtPct(p.ps_total_gm)} (needs 25%)`);
    return { p, reasons, verdict: (verdicts[p.name] && verdicts[p.name].verdict) || 'pending' };
  }).sort((a, b) => b.reasons.length - a.reasons.length || (a.p.meetings || 0) - (b.p.meetings || 0));
}

    </div>`;

  return `
    <div class="section">
      <div class="section-header">
        <h2 class="section-title">🟥 VAR TIME</h2>
        <p class="section-subtitle">Admin · Friday review of players outside the rules — set a verdict to drive the animation. Saved on this device.</p>
        <button id="vt-copy" class="copy-btn">📋 Copy review</button>
      </div>
      <div class="vt-controls">
        <input type="text" id="vt-search" class="search-input vt-search" placeholder="Search a player by name…" value="${escapeHtml(vartimeSearch)}" />
        <select id="vt-region" class="vt-select" aria-label="Filter by country">
          <option value="all">🌐 All countries</option>
          ${regionsPresent.map(r => `<option value="${r}" ${vartimeRegion === r ? 'selected' : ''}>${VT_REGION_LABELS[r] || r}</option>`).join('')}
        </select>
        <select id="vt-team" class="vt-select" aria-label="Filter by entity">
          <option value="all">🏢 All entities</option>
          ${teamsPresent.map(tm => `<option value="${escapeHtml(tm)}" ${vartimeTeam === tm ? 'selected' : ''}>${escapeHtml(tm)}</option>`).join('')}
        </select>
      </div>
      <div class="vt-summary">
        <span class="vt-pill total">${counts.total} under review</span>
        <span class="vt-pill pending">⏳ ${counts.pending} pending</span>
        <span class="vt-pill yellow">🟨 ${counts.yellow}</span>
        <span class="vt-pill red">🟥 ${counts.red}</span>
        <span class="vt-pill excused">✅ ${counts.excused}</span>
        <button class="vt-reset" id="vt-reset" title="Clear all verdicts">↺ Reset</button>
      </div>
      <div class="search-chips">
        <button class="search-chip vt-filter ${vartimeFilter === 'all' ? 'on' : ''}" data-f="all">All (${counts.total})</button>
        <button class="search-chip vt-filter ${vartimeFilter === 'pending' ? 'on' : ''}" data-f="pending">Pending (${counts.pending})</button>
      </div>
      ${list.length
        ? `<div class="vt-list">${list.map(card).join('')}</div>`

function renderMyPosition() {
  const q = positionQuery.trim().toLowerCase();

  if (q.length < 2) {
    resultHtml = `<div class="position-result"><div class="no-result">${t('pos.start')}</div></div>`;
  } else {
    const matches = people.filter(p => p.name.toLowerCase().includes(q));
    if (matches.length === 0) {
      resultHtml = `<div class="position-result"><div class="no-result">${t('pos.none')}</div></div>`;

  const stats = [
    {
      label: 'Golden Boot Rank',
      value: goldenRank ? `#${goldenRank}` : '—',

    },
    {

function generatePlayerCard(person) {
  if (!person) return;
  const img = new Image();
  img.onload = () => drawPlayerCard(person, img);
  img.onerror = () => drawPlayerCard(person, null);
  img.src = LOGO_DATA_URI || '';
  if (!LOGO_DATA_URI) drawPlayerCard(person, null);
}

function drawPlayerCard(person, logo) {
  const W = 760, H = 1080, s = 2; // 2x for crisp output
  const cv = document.createElement('canvas');
  cv.width = W * s; cv.height = H * s;
  const ctx = cv.getContext('2d');
  ctx.scale(s, s);
  const color = colorForTeam(person.team);
  const rr = (x, y, w, h, r) => { ctx.beginPath(); ctx.moveTo(x + r, y); ctx.arcTo(x + w, y, x + w, y + h, r); ctx.arcTo(x + w, y + h, x, y + h, r); ctx.arcTo(x, y + h, x, y, r); ctx.arcTo(x, y, x + w, y, r); ctx.closePath(); };

  // Background
  const g = ctx.createLinearGradient(0, 0, 0, H);
  g.addColorStop(0, '#2D3550'); g.addColorStop(0.5, '#1E2A78'); g.addColorStop(1, '#131a4d');
  ctx.fillStyle = g; ctx.fillRect(0, 0, W, H);
  // diagonal stripes
  ctx.strokeStyle = 'rgba(255,255,255,0.04)'; ctx.lineWidth = 2;
  for (let i = -H; i < W; i += 26) { ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i + H, H); ctx.stroke(); }
  // outer frame
  ctx.strokeStyle = color; ctx.lineWidth = 8; rr(16, 16, W - 32, H - 32, 26); ctx.stroke();
  // flag banner — the player's own country
  const bw = (W - 56) / 3;
  flagForTeam(person.team).forEach((c, i) => { ctx.fillStyle = c; ctx.fillRect(28 + i * bw, 34, bw, 10); });

  // logo
  if (logo) { const lw = 120, lh = logo.height * (lw / logo.width); ctx.drawImage(logo, (W - lw) / 2, 66, lw, lh); }

  ctx.fillText('SALES CHALLENGE 2026', W / 2, 244);

  // name + team
  ctx.fillStyle = '#fff';
  let name = person.name.toUpperCase();
  ctx.font = '700 44px "Arial Narrow", Impact, sans-serif';
  if (ctx.measureText(name).width > W - 80) ctx.font = '700 32px "Arial Narrow", Impact, sans-serif';
  ctx.fillText(name, W / 2, 312);
  ctx.fillStyle = color === '#FFFFFF' ? '#F2C75C' : '#F2C75C';
  ctx.font = '700 18px Inter, sans-serif';
  ctx.fillText(person.team.toUpperCase() + (person.is_rookie ? '  ·  🌱 ROOKIE' : ''), W / 2, 342);

  // stat rows
  const gRank = sortedGoldenBoot.findIndex(p => p.name === person.name) + 1;
  const pRank = sortedPlaymaker.findIndex(p => p.name === person.name) + 1;
  const tRank = sortedPSTotal.findIndex(p => p.name === person.name) + 1;
  const rows = [
    ['⚽ GOLDEN BOOT', gRank ? '#' + gRank : '—', fmtMoney(person.ps_nb) + ' NB'],
    ['🎯 PLAYMAKER', pRank ? '#' + pRank : '—', Number(person.opps || 0).toFixed(0) + ' opps'],
    ['💰 PS TOTAL', fmtMoney(person.ps_total), '#' + tRank + ' overall'],
    ['📊 GROSS MARGIN', fmtPct(person.ps_total_gm), person.yellow_gm ? '🟨 below 25%' : 'on target'],
    ['🤝 MEETINGS / WK', fmtNum(person.meetings), person.yellow_meetings ? '🟨 under 5' : 'on target']
  ];
  let y = 392;
  rows.forEach(r => {
    rr(40, y, W - 80, 96, 16); ctx.fillStyle = 'rgba(255,255,255,0.07)'; ctx.fill();
    rr(40, y, 6, 96, 3); ctx.fillStyle = color; ctx.fill();
    ctx.textAlign = 'left'; ctx.fillStyle = 'rgba(255,255,255,0.7)'; ctx.font = '700 16px Inter, sans-serif';
    ctx.fillText(r[0], 64, y + 36);
    ctx.fillStyle = 'rgba(255,255,255,0.55)'; ctx.font = '500 14px Inter, sans-serif';
    ctx.fillText(r[2], 64, y + 66);
    ctx.textAlign = 'right'; ctx.fillStyle = '#F2C75C'; ctx.font = '700 40px "Arial Narrow", Impact, sans-serif';
    ctx.fillText(r[1], W - 64, y + 58);
    y += 110;
  });

  // footer
  ctx.textAlign = 'center'; ctx.fillStyle = 'rgba(255,255,255,0.55)'; ctx.font = '500 14px Inter, sans-serif';
  ctx.fillText('Final in Paris · 9 July 2026 · Victoria Paris (l’Arc)', W / 2, H - 46);

  downloadCanvas(cv, person.name.replace(/[^a-z0-9]+/gi, '-').toLowerCase() + '-world-cup-card.png');
}

function downloadCanvas(cv, filename) {
  cv.toBlob(blob => {
    if (!blob) return;
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = filename;
    document.body.appendChild(a); a.click();
    setTimeout(() => { URL.revokeObjectURL(a.href); a.remove(); }, 1000);
  }, 'image/png');
}

// Stripes for a team/individual: their exact country if known, otherwise the
// region (handles entity names like "FR - M Cloud" → France).
function flagForTeam(team) {
  const u = String(team || '').toUpperCase().trim();
  return COUNTRY_FLAGS[u] || FLAG_STRIPES[regionOf(team)] || FLAG_STRIPES.OTHER;
}

// === Export the full standings as a PNG ===
function generateStandingsImage() {
  const img = new Image();
  img.onload = () => drawStandings(img);
  img.onerror = () => drawStandings(null);
  img.src = LOGO_DATA_URI || '';
  if (!LOGO_DATA_URI) drawStandings(null);
}
function drawStandings(logo) {
  const isNations = teamView === 'nations', isPlayers = teamView === 'players';
  const nr = isNations ? nationsRanking() : null;
  const top = isNations
    ? nr.map(n => ({ name: n.label, val: n.avg_ps }))
    : isPlayers
    ? sortedPSTotal.slice(0, 12).map(p => ({ name: p.name, val: p.ps_total }))
    : sortedTeams.slice(0, 12).map(t => ({ name: t.country, val: t.avg_ps }));
  // Theme the top bar after the leader's flag: the #1 nation (Nations) or the
  // #1 player's country/region (Players). Teams keep the brand stripe.
  const stripes = (isNations && nr[0]) ? (FLAG_STRIPES[nr[0].region] || FLAG_STRIPES.OTHER)
    : (isPlayers && sortedPSTotal[0]) ? flagForTeam(sortedPSTotal[0].team)
    : ['#C8102E', '#FFFFFF', '#006847'];
  const heading = isNations ? '🌍 NATIONS RANKING' : isPlayers ? '👤 PLAYER RANKING' : '🏆 TEAM RANKING';
  const footMetric = isPlayers ? 'PS Bookings Total' : 'Avg PS Bookings / person';
  const W = 820, rowH = 64, headH = 300, H = headH + top.length * rowH + 90, s = 2;
  const cv = document.createElement('canvas');
  cv.width = W * s; cv.height = H * s;
  const ctx = cv.getContext('2d'); ctx.scale(s, s);
  const rr = (x, y, w, h, r) => { ctx.beginPath(); ctx.moveTo(x + r, y); ctx.arcTo(x + w, y, x + w, y + h, r); ctx.arcTo(x + w, y + h, x, y + h, r); ctx.arcTo(x, y + h, x, y, r); ctx.arcTo(x, y, x + w, y, r); ctx.closePath(); };
  const g = ctx.createLinearGradient(0, 0, 0, H);
  g.addColorStop(0, '#2D3550'); g.addColorStop(0.5, '#1E2A78'); g.addColorStop(1, '#131a4d');
  ctx.fillStyle = g; ctx.fillRect(0, 0, W, H);
  ctx.strokeStyle = 'rgba(255,255,255,0.04)'; ctx.lineWidth = 2;
  for (let i = -H; i < W; i += 26) { ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i + H, H); ctx.stroke(); }
  ctx.strokeStyle = '#F2C75C'; ctx.lineWidth = 8; rr(16, 16, W - 32, H - 32, 26); ctx.stroke();
  const bw = (W - 56) / 3;
  stripes.forEach((c, i) => { ctx.fillStyle = c; ctx.fillRect(28 + i * bw, 34, bw, 10); });
  if (logo) { const lw = 110, lh = logo.height * (lw / logo.width); ctx.drawImage(logo, (W - lw) / 2, 60, lw, lh); }
  ctx.textAlign = 'center';
  ctx.fillStyle = '#F2C75C'; ctx.font = '700 24px Inter, sans-serif';
  ctx.fillText('DEVOTEAM WORLD CUP', W / 2, 200);
  ctx.fillStyle = 'rgba(255,255,255,0.7)'; ctx.font = '600 13px monospace';
  ctx.fillText('SALES CHALLENGE 2026' + (period ? ' · ' + period.toUpperCase() : ''), W / 2, 224);
  ctx.fillStyle = '#fff'; ctx.font = '700 40px "Arial Narrow", Impact, sans-serif';
  ctx.fillText(heading, W / 2, 274);

  let y = headH;
  top.forEach((row, i) => {
    const lead = i === 0;
    rr(40, y, W - 80, rowH - 10, 12);
    ctx.fillStyle = lead ? 'rgba(242,199,92,0.22)' : 'rgba(255,255,255,0.06)'; ctx.fill();
    if (lead) { ctx.strokeStyle = 'rgba(242,199,92,0.7)'; ctx.lineWidth = 2; ctx.stroke(); }
    ctx.textAlign = 'left';
    ctx.fillStyle = i === 0 ? '#F2C75C' : i === 1 ? '#9CA3AF' : i === 2 ? '#B45309' : 'rgba(255,255,255,0.85)';
    ctx.font = '700 30px "Arial Narrow", Impact, sans-serif';
    ctx.fillText((['🥇', '🥈', '🥉'][i] || ('#' + (i + 1))), 60, y + 36);
    ctx.fillStyle = '#fff'; ctx.font = '700 22px Inter, sans-serif';
    ctx.fillText(row.name, 130, y + 35);
    ctx.textAlign = 'right'; ctx.fillStyle = '#F2C75C'; ctx.font = '700 26px "Arial Narrow", Impact, sans-serif';
    ctx.fillText(fmtMoney(row.val), W - 64, y + 36);
    y += rowH;
  });
  ctx.textAlign = 'center'; ctx.fillStyle = 'rgba(255,255,255,0.55)'; ctx.font = '500 13px Inter, sans-serif';
  ctx.fillText(footMetric + ' · Final in Paris, 9 July 2026', W / 2, H - 40);
  downloadCanvas(cv, isNations ? 'devoteam-world-cup-nations.png' : isPlayers ? 'devoteam-world-cup-players.png' : 'devoteam-world-cup-standings.png');
}

// Live countdown to the Paris final (9 July 2026).
const FINAL_DATE = new Date('2026-07-09T19:00:00+02:00');
function updateCountdown() {
  const el = document.getElementById('countdown-live');
  if (!el) return;
  const ms = FINAL_DATE.getTime() - Date.now();
  if (ms <= 0) { el.textContent = t('cd.live'); return; }
  const d = Math.floor(ms / 86400000), h = Math.floor(ms / 3600000) % 24,
        m = Math.floor(ms / 60000) % 60, s = Math.floor(ms / 1000) % 60;
  el.textContent = t('cd.fmt', { d, h, m, s });
}

// === Live news ticker ===
let lastTickerHTML = '';
let recentEvents = []; // leader-change headlines, newest first
function buildTickerItems() {
  const it = [];
  recentEvents.slice(0, 4).forEach(e => it.push(e));
  if (sortedTeams[0]) it.push(`🏆 ${sortedTeams[0].country} lead the World Cup — ${fmtMoney(sortedTeams[0].avg_ps)}/person`);
  if (sortedGoldenBoot[0]) it.push(`🥇 Golden Boot: ${sortedGoldenBoot[0].name} — ${fmtMoney(sortedGoldenBoot[0].ps_nb)} NB`);
  if (sortedPlaymaker[0]) it.push(`🎯 Playmaker: ${sortedPlaymaker[0].name} — ${Number(sortedPlaymaker[0].opps || 0).toFixed(0)} opps`);
  if (sortedRookies[0]) it.push(`🌱 Top rookie: ${sortedRookies[0].name} — ${fmtMoney(sortedRookies[0].ps_nb)}`);
  if (sortedLicence[0]) it.push(`💼 Licence leader: ${sortedLicence[0].name} — ${fmtMoney(sortedLicence[0].licence_gm)}`);
  if (period) it.push(`📅 ${period}`);
  return it;
}
function updateTicker() {
  const track = document.getElementById('ticker-track');
  if (!track) return;
  const items = buildTickerItems();
  if (!items.length) return;
  const seq = items.map(s => `<span class="ticker-item">${escapeHtml(s)}</span>`).join('<span class="ticker-dot">•</span>');
  if (seq === lastTickerHTML) return;      // unchanged -> keep scrolling smoothly
  lastTickerHTML = seq;
  // duplicate for a seamless loop
  track.innerHTML = seq + '<span class="ticker-dot">•</span>' + seq + '<span class="ticker-dot">•</span>';
  // iOS Safari sometimes doesn't start a CSS animation on an element that was
  // display:none when the animation was assigned (the ticker starts hidden until
  // login). Force a reflow to (re)start the scroll reliably -> no "empty band".
  track.style.animation = 'none';
  void track.offsetWidth; // reflow
  track.style.animation = '';
}

}, { passive: true });


// === LIVE: authentication ===
// Safe localStorage wrappers — some in-app webviews block storage and throw.
function safeGet(k) { try { return localStorage.getItem(k); } catch (e) { return null; } }
function safeSet(k, v) { try { localStorage.setItem(k, v); } catch (e) {} }
function safeRemove(k) { try { localStorage.removeItem(k); } catch (e) {} }

function isLoggedIn() {
  return safeGet(CONFIG.SESSION_KEY) === '1';
}

function logout() {
  safeRemove(CONFIG.SESSION_KEY);
  safeRemove(CONFIG.PWD_KEY);
  location.reload();
}

// === Dark mode ===
const THEME_KEY = 'devoteam_wc_theme_v1';
function applyTheme(theme) {
  const dark = theme === 'dark';
  document.documentElement.dataset.theme = dark ? 'dark' : '';
  const btn = document.getElementById('theme-btn');
  if (btn) { btn.textContent = dark ? '☀️' : '🌙'; btn.title = dark ? 'Switch to light mode' : 'Switch to dark mode'; }
  const meta = document.querySelector('meta[name="theme-color"]');
  if (meta) meta.setAttribute('content', dark ? '#0E1322' : '#1E2A78');
}
function currentTheme() {
  const saved = safeGet(THEME_KEY);
  if (saved === 'dark' || saved === 'light') return saved;
  return (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) ? 'dark' : 'light';
}
function toggleTheme() {
  const next = document.documentElement.dataset.theme === 'dark' ? 'light' : 'dark';
  safeSet(THEME_KEY, next);
  applyTheme(next);
}

// === LIVE: admin (manual-refresh) gating ===
function isAdmin() {
  return safeGet(CONFIG.ADMIN_FLAG) === '1';
}

// Activate/deactivate admin mode from ?admin=<key> (or ?admin=off), then strip
// the param from the URL so it isn't bookmarked or shared.
function checkAdminParam() {
  try {
    const params = new URLSearchParams(location.search);
    if (!params.has('admin')) return;
    const val = params.get('admin');
    if (val === CONFIG.ADMIN_KEY) safeSet(CONFIG.ADMIN_FLAG, '1');
    else if (val === 'off') safeRemove(CONFIG.ADMIN_FLAG);
    params.delete('admin');
    const qs = params.toString();
    history.replaceState(null, '', location.pathname + (qs ? '?' + qs : '') + location.hash);
  } catch (e) {}
}

// Show the refresh button only for admins.
function applyAdminVisibility() {
  const btn = document.getElementById('refresh-btn');
  if (btn) btn.style.display = isAdmin() ? 'flex' : 'none';
}

async function attemptLogin(password) {
  try {
    const res = await fetch(CONFIG.APPS_SCRIPT_URL, {
      method: 'POST',
      // text/plain avoids a CORS preflight against Apps Script.
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify({ action: 'verify_password', password })
    });
    const data = await res.json();
    if (data.ok) {
      safeSet(CONFIG.SESSION_KEY, '1');
      safeSet(CONFIG.PWD_KEY, password); // needed to authorize each data request
      return true;
    }
    return false;
  } catch (err) {
    console.error('Login failed:', err);
    return null; // null = network/back-end error (distinct from wrong password)
  }
}

// Kick-off! When data is ready, the ball is struck and rockets off the pitch,
// the loader fades, and the app takes its place. Resolves when the ball is gone.
function playKickoff() {
  return new Promise(resolve => {
    const screen = document.querySelector('.loader-screen');
    const reduce = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    if (!screen || reduce) { resolve(); return; }
    const ball = screen.querySelector('.loader-ball');
    const shadow = screen.querySelector('.loader-ball-shadow');
    const sub = screen.querySelector('.loader-sub');
    if (sub) sub.textContent = 'Kick-off! ⚽';
    if (ball) ball.classList.add('kicked');
    if (shadow) shadow.classList.add('kicked');
    setTimeout(() => screen.classList.add('kicked'), 230); // fade the pitch out behind the ball
    setTimeout(resolve, 620);
  });
}

// Scroll so the current tab's content sits just below the sticky header + tab
// bar — used after picking a player so the result is visible, not hidden under
// the hero podium (users don't intuitively scroll down to find it).
function scrollToMainContent(behavior) {
  requestAnimationFrame(() => {
    const section = document.querySelector('#app .section');
    if (!section) { window.scrollTo(0, 0); return; }
    const header = document.querySelector('.app-header');
    const tabs = document.querySelector('.tabs-bar');
    const offset = (header ? header.offsetHeight : 0) + (tabs ? tabs.offsetHeight : 0) + 8;
    const y = section.getBoundingClientRect().top + window.scrollY - offset;
    window.scrollTo({ top: Math.max(0, y), behavior: behavior || 'smooth' });
  });
}

// Back-to-top button: show it once the user has scrolled a screenful down, and
// smooth-scroll home on click. Bound once; survives re-renders (lives outside #app).
function initScrollTop() {
  const btn = document.getElementById('scroll-top');
  if (!btn || btn.dataset.bound) return;
  btn.dataset.bound = '1';
  const reduce = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  btn.addEventListener('click', () => window.scrollTo({ top: 0, behavior: reduce ? 'auto' : 'smooth' }));
  let ticking = false;
  const update = () => {
    ticking = false;
    // z-index keeps it under modals/TV (1000); the tvMode guard avoids it lingering.
    const show = window.scrollY > window.innerHeight * 0.8 && !tvMode;
    btn.hidden = false;
    btn.classList.toggle('show', show);
  };
  window.addEventListener('scroll', () => {
    if (!ticking) { ticking = true; requestAnimationFrame(update); }
  }, { passive: true });
  refreshScrollTop = update; // let TV mode re-evaluate visibility on open/close
  update();
}
let refreshScrollTop = () => {};

            <button class="cmp-caret" type="button" tabindex="-1" aria-label="Toggle list">▾</button>
            <div class="cmp-list" role="listbox" hidden></div>
          </div>
        </div>
        <div id="compare-table"></div>
      </div>
    </div>`;
  document.body.appendChild(el);
  document.body.style.overflow = 'hidden';
  const close = () => { cleanups.forEach(fn => fn()); el.remove(); document.body.style.overflow = ''; document.removeEventListener('keydown', onKey); };
  const onKey = e => { if (e.key === 'Escape') close(); };
  el.addEventListener('click', e => { if (e.target === el) close(); });
  el.querySelector('#compare-close').addEventListener('click', close);
  document.addEventListener('keydown', onKey);

  let comboA, comboB;
  const optionsFor = () => mode === 'teams' ? sortedTeams.map(t => t.country)
    : mode === 'nations' ? nationsRanking().map(n => n.label)
    : sortedGoldenBoot.map(p => p.name);
  // If we opened from My Position and a player is resolved, pre-fill them as A.
  let presetA = null;
  if (currentTab === 'position') {
    const q = positionQuery.trim().toLowerCase();
    if (q.length >= 2) {
      const matches = people.filter(p => p.name.toLowerCase().includes(q));
      const found = matches.length === 1 ? matches[0] : matches.find(p => p.name.toLowerCase() === q);
      if (found) presetA = found.name;

  const fill = () => {

      comboA.setValue(opts[0] || '');

    presetA = null; // honour the preset only on the first fill
  };
  const draw = () => {
    const aV = comboA.getValue(), bV = comboB.getValue();
    let rows;
    const hint = m => { el.querySelector('#compare-table').innerHTML = `<div class="no-result">${m}</div>`; };
    if (mode === 'teams') {
      const A = teams.find(t => t.country === aV), B = teams.find(t => t.country === bV);
      if (!A || !B) return hint('Type and pick two teams to compare.');
      const rk = c => sortedTeams.findIndex(t => t.country === c) + 1;
      rows = [
        ['World Cup rank', `#${rk(aV)}`, `#${rk(bV)}`, lower(rk(aV), rk(bV))],
        ['Avg PS / person', fmtMoney(A.avg_ps), fmtMoney(B.avg_ps), better(A.avg_ps, B.avg_ps)],
        ['Total PS', fmtMoney(A.total_ps), fmtMoney(B.total_ps), better(A.total_ps, B.total_ps)],
        ['Members', A.members, B.members, -1],
        ['Avg GM', fmtPct(A.avg_gm), fmtPct(B.avg_gm), better(A.avg_gm, B.avg_gm)],
        ['Avg meetings', fmtNum(A.avg_meetings), fmtNum(B.avg_meetings), better(A.avg_meetings, B.avg_meetings)],
        ['Avg opps', fmtNum(A.avg_opps), fmtNum(B.avg_opps), better(A.avg_opps, B.avg_opps)]
      ];
    } else if (mode === 'nations') {
      const nations = nationsRanking();
      const A = nations.find(n => n.label === aV), B = nations.find(n => n.label === bV);
      if (!A || !B) return hint('Type and pick two nations to compare.');
      const rk = lbl => nations.findIndex(n => n.label === lbl) + 1;
      rows = [
        ['Nations rank', `#${rk(aV)}`, `#${rk(bV)}`, lower(rk(aV), rk(bV))],
        ['Avg PS / person', fmtMoney(A.avg_ps), fmtMoney(B.avg_ps), better(A.avg_ps, B.avg_ps)],
        ['Total PS', fmtMoney(A.total_ps), fmtMoney(B.total_ps), better(A.total_ps, B.total_ps)],
        ['Avg GM', fmtPct(A.avg_gm), fmtPct(B.avg_gm), better(A.avg_gm, B.avg_gm)],
        ['Teams', A.teams, B.teams, -1],
        ['People', A.people, B.people, -1]
      ];
    } else {
      const A = people.find(p => p.name === aV), B = people.find(p => p.name === bV);
      if (!A || !B) return hint('Type and pick two players to compare.');
      const gr = n => sortedGoldenBoot.findIndex(p => p.name === n) + 1, pr = n => sortedPlaymaker.findIndex(p => p.name === n) + 1;
      rows = [
        ['Team', A.team, B.team, -1],
        ['Golden Boot rank', `#${gr(aV)}`, `#${gr(bV)}`, lower(gr(aV), gr(bV))],
        ['PS New Business', fmtMoney(A.ps_nb), fmtMoney(B.ps_nb), better(A.ps_nb, B.ps_nb)],
        ['Playmaker rank', `#${pr(aV)}`, `#${pr(bV)}`, lower(pr(aV), pr(bV))],
        ['Opps created', Number(A.opps || 0).toFixed(0), Number(B.opps || 0).toFixed(0), better(A.opps, B.opps)],
        ['PS Total', fmtMoney(A.ps_total), fmtMoney(B.ps_total), better(A.ps_total, B.ps_total)],
        ['GM total', fmtPct(A.ps_total_gm), fmtPct(B.ps_total_gm), better(A.ps_total_gm, B.ps_total_gm)],
        ['Meetings / wk', fmtNum(A.meetings), fmtNum(B.meetings), better(A.meetings, B.meetings)]

    el.querySelector('#compare-table').innerHTML = `
      <table class="cmp-table">
        <thead><tr><th></th><th>${escapeHtml(aV)}</th><th>${escapeHtml(bV)}</th></tr></thead>
        <tbody>${rows.map(r => `<tr><td class="cmp-metric">${r[0]}</td>
          <td class="${r[3] === 0 ? 'cmp-win' : ''}">${r[1]}</td>
          <td class="${r[3] === 1 ? 'cmp-win' : ''}">${r[2]}</td></tr>`).join('')}</tbody>
      </table>`;
  };
  // Custom combobox: a text input you can TYPE in (filters the list) plus a ▾
  // caret that opens the full dropdown — works reliably on mobile/tablet too.
  function setupCombo(root) {
    const input = root.querySelector('.cmp-input');
    const caret = root.querySelector('.cmp-caret');
    const list = root.querySelector('.cmp-list');
    let active = -1;
    const renderList = (filter) => {
      const f = (filter || '').toLowerCase();
      const opts = optionsFor().filter(o => o.toLowerCase().includes(f));
      list.innerHTML = opts.length
        ? opts.map(o => `<div class="cmp-opt" role="option" data-v="${escapeHtml(o)}">${escapeHtml(o)}</div>`).join('')
        : '<div class="cmp-opt cmp-empty">No match</div>';
      active = -1;
    };
    const openList = (filter) => { renderList(filter); list.hidden = false; root.classList.add('open'); };
    const closeList = () => { list.hidden = true; root.classList.remove('open'); };
    const commit = (v) => { input.value = v; closeList(); draw(); };
    input.addEventListener('focus', () => openList(''));
    input.addEventListener('input', () => { openList(input.value); draw(); });
    input.addEventListener('keydown', e => {
      const opts = [...list.querySelectorAll('.cmp-opt:not(.cmp-empty)')];
      if (e.key === 'ArrowDown') { e.preventDefault(); if (list.hidden) openList(''); active = Math.min(active + 1, opts.length - 1); }
      else if (e.key === 'ArrowUp') { e.preventDefault(); active = Math.max(active - 1, 0); }
      else if (e.key === 'Enter') { if (!list.hidden) { e.preventDefault(); const pick = opts[active] || opts[0]; if (pick) commit(pick.dataset.v); } return; }
      else if (e.key === 'Escape') { if (!list.hidden) { e.preventDefault(); closeList(); } return; }
      else return;
      opts.forEach((o, i) => o.classList.toggle('active', i === active));
      if (opts[active]) opts[active].scrollIntoView({ block: 'nearest' });
    });
    caret.addEventListener('click', e => { e.preventDefault(); if (list.hidden) { input.focus(); openList(''); } else closeList(); });
    list.addEventListener('mousedown', e => { const o = e.target.closest('.cmp-opt:not(.cmp-empty)'); if (o) { e.preventDefault(); commit(o.dataset.v); } });
    const outside = e => { if (!root.contains(e.target)) closeList(); };
    document.addEventListener('mousedown', outside);
    cleanups.push(() => document.removeEventListener('mousedown', outside));
    return { getValue: () => input.value, setValue: v => { input.value = v; } };
  }
  comboA = setupCombo(el.querySelector('#combo-a'));
  comboB = setupCombo(el.querySelector('#combo-b'));
  el.querySelectorAll('.search-chip').forEach(c => c.addEventListener('click', () => {
    mode = c.dataset.m; el.querySelectorAll('.search-chip').forEach(x => x.classList.toggle('on', x === c)); fill(); draw();
  }));
  fill(); draw();
}

// === LIVE: TV / projection mode ===
let tvMode = false, tvPanel = 0, tvTimer = null;
const TV_PANELS = ['podium', 'golden', 'playmaker', 'spotlight', 'var', 'fairplay', 'awards'];
const TV_ROTATE_MS = 10000; // 10s per panel

function startTvTimer() {
  clearInterval(tvTimer);
  tvTimer = setInterval(() => { tvPanel = (tvPanel + 1) % TV_PANELS.length; renderTV(); }, TV_ROTATE_MS);
}

// Manual navigation (swipe / arrows / arrows buttons / dots). Resets the auto
// rotation so it doesn't jump immediately after a manual move.
function tvGo(delta) {
  if (!tvMode) return;
  const n = TV_PANELS.length;
  tvPanel = (tvPanel + delta + n) % n;
  renderTV();
  startTvTimer();
}
function tvGoto(i) {
  if (!tvMode) return;
  tvPanel = ((i % TV_PANELS.length) + TV_PANELS.length) % TV_PANELS.length;
  renderTV();
  startTvTimer();
}

function enterTV() {
  tvMode = true; tvPanel = 0;
  // Note: we deliberately do NOT call requestFullscreen() — it triggers the
  // browser's native "press Esc to exit full screen" banner. The overlay already
  // covers the whole viewport; use F11 manually for true fullscreen if wanted.
  renderTV();
  startTvTimer();
  refreshScrollTop();
}

function exitTV() {
  if (!tvMode) return;
  tvMode = false;
  clearInterval(tvTimer); tvTimer = null;
  try { if (document.fullscreenElement) document.exitFullscreen(); } catch (e) {}
  const root = document.getElementById('tv-root');
  if (root) root.innerHTML = '';
  refreshScrollTop();
}

function toggleTV() { tvMode ? exitTV() : enterTV(); }

function tvPanelHTML(kind) {
  if (kind === 'podium') {
    const rows = sortedTeams.slice(0, 3).map((t, i) =>
      `<div class="tv-row${i === 0 ? ' lead' : ''}">
        <span class="tv-pos">${['🥇', '🥈', '🥉'][i]}</span>
        <span class="tv-name">${escapeHtml(t.country)} <em>${t.members} players</em></span>
        <span class="tv-val">${fmtMoney(t.avg_ps)}</span>
      </div>`).join('');
    return tvSection('🏆 WORLD CUP — TOP TEAMS', 'Average PS Bookings per person', rows);
  }
  if (kind === 'golden') {
    const rows = sortedGoldenBoot.slice(0, 5).map((p, i) => tvPersonRow(i, p, fmtMoney(p.ps_nb))).join('');
    return tvSection('🥇 GOLDEN BOOT — TOP SCORERS', 'PS Bookings — New Business', rows);
  }
  if (kind === 'playmaker') {
    const rows = sortedPlaymaker.slice(0, 5).map((p, i) => tvPersonRow(i, p, Number(p.opps).toFixed(0))).join('');
    return tvSection('🎯 PLAYMAKERS — MOST ASSISTS', 'Opportunities created', rows);
  }
  if (kind === 'var') {
    const union = people.filter(p => p.yellow_meetings || p.yellow_gm)
      .sort((a, b) => ((b.yellow_meetings ? 1 : 0) + (b.yellow_gm ? 1 : 0)) - ((a.yellow_meetings ? 1 : 0) + (a.yellow_gm ? 1 : 0)) || (a.meetings || 0) - (b.meetings || 0));
    const n = union.length;
    const rows = union.slice(0, 5).map(p => {
      const bits = [];
      if (p.yellow_meetings) bits.push(`${fmtNum(p.meetings)} mtg/wk`);
      if (p.yellow_gm) bits.push(`GM ${fmtPct(p.ps_total_gm)}`);
      return `<div class="tv-row"><span class="tv-pos">🟨</span><span class="tv-name">${escapeHtml(p.name)} <em>${escapeHtml(p.team)}</em></span><span class="tv-val">${bits.join(' · ')}</span></div>`;
    }).join('') || `<div class="tv-row"><span class="tv-name">Clean across the board — no cards! ✅</span></div>`;
    return tvSection('🟨 VAR ROOM — ON A YELLOW CARD', `${n} player${n === 1 ? '' : 's'} to watch · two yellows make a red`, rows);
  }
  if (kind === 'fairplay') {
    const clean = people.filter(p => !p.yellow_meetings && !p.yellow_gm && ((p.ps_total || 0) > 0 || (p.ps_nb || 0) > 0));
    const top = [...clean].sort((a, b) => (b.ps_nb || 0) - (a.ps_nb || 0)).slice(0, 5);
    const rows = top.length
      ? top.map(p => `<div class="tv-row tv-row-clean"><span class="tv-pos">✅</span><span class="tv-name">${escapeHtml(p.name)} <em>${escapeHtml(p.team)}</em></span><span class="tv-val">${fmtMoney(p.ps_nb)}</span></div>`).join('')
      : `<div class="tv-row"><span class="tv-name">No clean sheets yet.</span></div>`;
    return tvSection('🧤 CLEAN SHEET — FAIR PLAY', `${clean.length} playing fully by the rules · 5+ meetings/week and GM ≥ 25%`, rows);
  }
  if (kind === 'awards') {
    const awRows = (list, valFn) => list.length
      ? list.map((p, i) => tvPersonRow(i, p, valFn(p))).join('')
      : `<div class="tv-row"><span class="tv-name" style="opacity:.7">To be revealed</span></div>`;
    const lic = awRows(sortedLicence.slice(0, 3), p => fmtMoney(p.licence_gm));
    const rook = awRows(sortedRookies.slice(0, 3), p => fmtMoney(p.ps_nb));
    return `<div class="tv-title">⭐ SPECIAL AWARDS</div><div class="tv-sub">Licence &amp; Rookie of the Year</div>
      <div class="tv-awards">
        <div class="tv-awcol"><div class="tv-awh">💼 Licence</div><div class="tv-list">${lic}</div></div>
        <div class="tv-awcol"><div class="tv-awh">🌱 Rookie of the Year</div><div class="tv-list">${rook}</div></div>
      </div>`;
  }
  const rows = buildSpotlights().map(s =>
    `<div class="tv-row">
      <span class="tv-pos">${s.icon}</span>
      <span class="tv-name">${escapeHtml(s.person.name)} <em>${escapeHtml(s.person.team)}</em><small>${s.cat}</small></span>
      <span class="tv-val">${spotStatText(s)}</span>
    </div>`).join('');
  return tvSection('⭐ PLAYERS OF THE MOMENT', "This matchday's standout performances", rows);
}
function renderTV() {
  if (!tvMode) return;
  const root = document.getElementById('tv-root');
  if (!root) return;
  root.innerHTML = `
    <div class="tv-overlay" id="tv-overlay">
      <div class="tv-bar">
        <div class="tv-brand">DEVOTEAM WORLD CUP${period ? ' · ' + escapeHtml(period) : ''}</div>
        <button class="tv-close" id="tv-close" title="Exit (Esc)">✕ Exit</button>
      </div>
      <button class="tv-nav tv-prev" id="tv-prev" aria-label="Previous">‹</button>
      <button class="tv-nav tv-next" id="tv-next" aria-label="Next">›</button>
      <div class="tv-body tv-anim">${tvPanelHTML(TV_PANELS[tvPanel])}</div>
      <div class="tv-dots">${TV_PANELS.map((_, i) => `<span class="${i === tvPanel ? 'on' : ''}" data-i="${i}"></span>`).join('')}</div>
    </div>`;
  const c = document.getElementById('tv-close');
  if (c) c.addEventListener('click', exitTV);
  const prev = document.getElementById('tv-prev');
  const next = document.getElementById('tv-next');
  if (prev) prev.addEventListener('click', () => tvGo(-1));
  if (next) next.addEventListener('click', () => tvGo(1));
  root.querySelectorAll('.tv-dots span').forEach(d =>
    d.addEventListener('click', () => tvGoto(parseInt(d.getAttribute('data-i'), 10))));
}

// === LIVE: polling ===
let pollIntervalId = null;

// Background refresh used by polling and on tab re-focus: uses the server cache
// (fresh=false) to stay fast and protect the Apps Script quota, and never
// replays entrance animations.
async function backgroundRefresh() {
  const success = await fetchData(false);
  if (success) {
    const scrollY = window.scrollY;
    suppressAnim = true;
    try { render(); } finally { suppressAnim = false; }
    window.scrollTo(0, scrollY);
    if (tvMode) renderTV(); // keep the projection panel live
  }
  return success;
}

function nextPollDelay() {
  // Base 45s ± jitter (0.75x–1.25x → ~34–56s) so clients don't poll in lockstep.
  // This spreads requests out and avoids the "thundering herd" spikes at launch.
  return Math.round(CONFIG.POLL_INTERVAL_MS * (0.75 + Math.random() * 0.5));
}

function startPolling() {
  stopPolling();
  const tick = () => {
    backgroundRefresh();
    pollIntervalId = setTimeout(tick, nextPollDelay());
  };
  pollIntervalId = setTimeout(tick, nextPollDelay());
}

function stopPolling() {
  if (pollIntervalId) { clearTimeout(pollIntervalId); pollIntervalId = null; }
}

// Pause polling when the tab is hidden (saves Apps Script quota).
document.addEventListener('visibilitychange', () => {
  if (!isLoggedIn()) return;
  if (document.hidden) stopPolling();
  else { backgroundRefresh(); startPolling(); } // cached refresh, not a cache-bypass
});

// === LIVE: manual refresh (header button) ===
async function manualRefresh() {
  const btn = document.getElementById('refresh-btn');
  if (btn) btn.classList.add('spinning');
  const scrollY = window.scrollY;
  await fetchData(true); // force a fresh read, bypass server cache
  suppressAnim = true;
  try { render(); } finally { suppressAnim = false; }
  window.scrollTo(0, scrollY);
  if (tvMode) renderTV();
  if (btn) setTimeout(() => btn.classList.remove('spinning'), 600);
}

// === LIVE: app init ===
async function init() {
  const app = document.getElementById('app');

  if (!isLoggedIn()) {
    setChromeVisible(false);
    const showLogin = (err) => {
      app.innerHTML = renderLoginScreen(err);
      const btn = document.getElementById('login-btn');
      const input = document.getElementById('login-pwd');
      const submit = async () => {
        const pwd = input.value.trim();
        if (!pwd) return;
        btn.textContent = t('login.checking');
        btn.disabled = true;
        const ok = await attemptLogin(pwd);
        if (ok === true) {
          init(); // re-init now that we're authenticated
        } else if (ok === false) {
          showLogin(t('login.bad'));
        } else {
          showLogin(t('login.err'));
        }
      };
      btn.addEventListener('click', submit);
      input.addEventListener('keydown', e => { if (e.key === 'Enter') submit(); });
      input.focus();
    };
    showLogin();
    return;
  }

  // Logged in: show the app chrome, load data, then render + poll.
  setChromeVisible(true);
  const loadStart = performance.now();
  app.innerHTML = renderLoader();
  const ok = await fetchData();
  if (!ok) {
    app.innerHTML = `<div class="state-msg error">Failed to load data.<br/><button class="login-btn" onclick="location.reload()">Retry</button></div>`;
    return;
  }

  // Let the ball bounce at least a beat, then strike the kick-off.
  const elapsed = performance.now() - loadStart;
  if (elapsed < 750) await new Promise(r => setTimeout(r, 750 - elapsed));
  await playKickoff();

  restoreTab(); // open the tab from the URL hash / last used
  render();
  app.style.animation = 'appEnter 0.45s ease both';
  setTimeout(() => { app.style.animation = ''; }, 500);

  // Bind the header refresh button once (it lives outside #app, so it survives re-renders).
  const refreshBtn = document.getElementById('refresh-btn');
  if (refreshBtn && !refreshBtn.dataset.bound) {
    refreshBtn.dataset.bound = '1';
    refreshBtn.addEventListener('click', () => { if (isAdmin()) manualRefresh(); });
  }
  applyAdminVisibility(); // manual refresh is admin-only

  // Bind the TV/projection button once.
  const tvBtn = document.getElementById('tv-btn');
  if (tvBtn && !tvBtn.dataset.bound) {
    tvBtn.dataset.bound = '1';
    tvBtn.addEventListener('click', toggleTV);
  }
  const rulesBtn = document.getElementById('rules-btn');
  if (rulesBtn && !rulesBtn.dataset.bound) {
    rulesBtn.dataset.bound = '1';
    rulesBtn.addEventListener('click', openRules);
  }
  const themeBtn = document.getElementById('theme-btn');
  if (themeBtn && !themeBtn.dataset.bound) {
    themeBtn.dataset.bound = '1';
    themeBtn.addEventListener('click', toggleTheme);
  }
  const searchBtn = document.getElementById('search-btn');
  if (searchBtn && !searchBtn.dataset.bound) {
    searchBtn.dataset.bound = '1';
    searchBtn.addEventListener('click', openSearch);
  }
  initScrollTop();

  startPolling();

  // Projection screens: ?tv=1 launches straight into TV mode (param kept so a
  // reload re-enters it). Fullscreen itself may need one click/F11 (browser rule).
  try {
    if (!tvMode && new URLSearchParams(location.search).get('tv') === '1') enterTV();
  } catch (e) {}
}

// Read the admin activation param before anything else renders.
document.documentElement.lang = 'en';
applyTheme(currentTheme());
checkAdminParam();

// Never leave a silent blank page: surface any unexpected init error.
init().catch(err => {
  console.error('Init error:', err);
  const app = document.getElementById('app');
  if (app) app.innerHTML = `<div class="state-msg error">Something went wrong loading the app.<br/><button class="login-btn" onclick="location.reload()">Reload</button></div>`;
});

// Tick the live countdown every second (no-ops until the footer exists).
setInterval(updateCountdown, 1000);

// PWA: register the service worker (https only; silently ignored on file://).
// When a new worker takes control after a deploy, reload once so users always
// land on the latest build without a manual hard refresh.
if ('serviceWorker' in navigator) {
  // Only auto-reload on UPDATES (a worker already controls the page), never on the
  // first-ever install — and only once, so there is no reload loop.
  if (navigator.serviceWorker.controller) {
    let swReloaded = false;
    navigator.serviceWorker.addEventListener('controllerchange', () => {
      if (swReloaded) return;
      swReloaded = true;
      location.reload();
    });
  }
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('service-worker.js').then(reg => {
      reg.update().catch(() => {}); // proactively check for a new build each load
    }).catch(() => {});
  });
}
</script>
