name: UX tests

# Re-runs the headless browser tests on every PR and on pushes to main, so a
# regression is caught even when code is pushed from outside a dev machine (the
# local pre-push hook only protects local pushes).

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch: {}

jobs:
  ux:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Playwright + Chromium
        run: |
          npm init -y
          npm install --no-save playwright@1.56.1
          npx playwright@1.56.1 install --with-deps chromium

      - name: UX smoke test (core + CTA + responsive)
        run: node test/ux-smoke.cjs

      - name: Deep UX e2e (admin, TV, share, ticker, compare, dark, mobile)
        run: node test/ux-e2e.cjs
