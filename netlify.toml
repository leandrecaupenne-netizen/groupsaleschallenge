# Netlify configuration — Devoteam World Cup Sales Challenge 2026
# Static single-file site: no build step, publish the repo root.

[build]
  publish = "."
  command = ""

# Serve index.html at the root.
[[redirects]]
  from = "/"
  to = "/index.html"
  status = 200

# Basic security headers for a public static site.
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Always revalidate the HTML so users get fresh data wiring after a redeploy.
[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
