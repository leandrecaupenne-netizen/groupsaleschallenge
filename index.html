// === Global player search (with tenure / rookie filters) ===
// Scroll so the current tab's content sits near the top of the viewport — used
// after picking a player so the result is visible, not hidden under the hero
// podium (users don't intuitively scroll down to find it).
function scrollToMainContent(behavior) {
  requestAnimationFrame(() => {
    const section = document.querySelector('#app .section');
    if (!section) { window.scrollTo(0, 0); return; }
    const tb = document.querySelector('.tabs-wrap');
    const y = section.getBoundingClientRect().top + window.scrollY - ((tb ? tb.offsetHeight : 0) + 8);
    window.scrollTo({ top: Math.max(0, y), behavior: behavior || 'smooth' });
  });
}

// Back-to-top button: show it once the user has scrolled a screenful down, and
// smooth-scroll home on click. Bound once; survives re-renders (lives outside #app).
function initScrollTop() {
  const btn = document.getElementById('scroll-top');
  if (!btn || btn.dataset.bound) return;
  btn.dataset.bound = '1';
  const reduce = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  btn.addEventListener('click', () => window.scrollTo({ top: 0, behavior: reduce ? 'auto' : 'smooth' }));
  let ticking = false;
  const update = () => {
    ticking = false;
    // z-index keeps it under modals/TV (1000); the tvMode guard avoids it lingering.
    const show = window.scrollY > window.innerHeight * 0.8 && !tvMode;
    btn.hidden = false;
    btn.classList.toggle('show', show);
  };
  window.addEventListener('scroll', () => {
    if (!ticking) { ticking = true; requestAnimationFrame(update); }
  }, { passive: true });
  refreshScrollTop = update; // let TV mode re-evaluate visibility on open/close
  update();
}
let refreshScrollTop = () => {};

function openSearch() {
  if (document.getElementById('search-overlay')) return;
  let query = '', filter = 'all';
  const el = document.createElement('div');
  el.className = 'modal-overlay'; el.id = 'search-overlay';
  const chips = [['all', 'All'], ['rookie', '🌱 Rookies'], ['year', 'Over a year'], ['under', '< 1 year']];
  el.innerHTML = `
    <div class="modal search-modal" onclick="event.stopPropagation()">
      <div class="modal-header">
        <div class="modal-title-block"><h2 class="modal-title">🔍 FIND A PLAYER</h2>
          <div class="modal-subtitle">Search all ${people.length} salespeople</div></div>
        <button class="modal-close" id="search-close" aria-label="Close">×</button>
      </div>
      <div class="search-modal-body">
        <input type="text" id="search-input" class="search-input" placeholder="Type a name…" autocomplete="off" />
        <div class="search-chips">${chips.map(c => `<button class="search-chip${c[0] === 'all' ? ' on' : ''}" data-f="${c[0]}">${c[1]}</button>`).join('')}</div>
        <div class="search-results" id="search-results"></div>
      </div>
    </div>`;
  document.body.appendChild(el);
  document.body.style.overflow = 'hidden';
  const close = () => { el.remove(); document.body.style.overflow = ''; document.removeEventListener('keydown', onKey); };
  const onKey = e => { if (e.key === 'Escape') close(); };
  el.addEventListener('click', e => { if (e.target === el) close(); });
  el.querySelector('#search-close').addEventListener('click', close);
  document.addEventListener('keydown', onKey);
  const matchFilter = p => {
    if (filter === 'rookie') return p.is_rookie;
    if (filter === 'year') return String(p.tenure) === 'Over a year';
    if (filter === 'under') return /months|</.test(String(p.tenure || ''));
    return true;
  };
  const renderResults = () => {
    const q = query.trim().toLowerCase();
    // Ranked by PS Total desc — same metric as the player ranking, so search
    // results line up with the leaderboard.
    let list = people.filter(p => matchFilter(p) && (!q || p.name.toLowerCase().includes(q)))
      .sort((a, b) => (b.ps_total || 0) - (a.ps_total || 0));
    const total = list.length; list = list.slice(0, 40);
    const box = el.querySelector('#search-results');
    box.innerHTML = list.length ? (list.map(p => {
      const tRank = sortedPSTotal.findIndex(x => x.name === p.name) + 1;
      return `<button class="search-result" data-name="${escapeHtml(p.name)}">
        <span class="pic-disc${photoFor(p.name) ? ' has-photo' : ''}" style="--ac:${colorForTeam(p.team)}">${avatarInner(p.name)}</span>
        <span class="sr-name">${escapeHtml(p.name)}<em>${escapeHtml(p.team)}</em></span>
        <span class="sr-stat">${fmtMoney(p.ps_total)}${tRank ? ` · #${tRank}` : ''}</span></button>`;
    }).join('') + (total > 40 ? `<div class="var-more">+ ${total - 40} more — refine your search</div>` : ''))
      : `<div class="no-result">No player found.</div>`;
    box.querySelectorAll('.search-result').forEach(btn => btn.addEventListener('click', () => {
      // Open the same Panini player card as everywhere else.
      close();
      openPlayerModal = btn.dataset.name;
      render();
      document.body.style.overflow = 'hidden';
    }));
  };
  const searchInput = el.querySelector('#search-input');
  searchInput.addEventListener('input', e => { query = e.target.value; renderResults(); });
  // Enter opens the top result — faster than reaching for it.
  searchInput.addEventListener('keydown', e => {
    if (e.key === 'Enter') {
      const first = el.querySelector('.search-result');
      if (first) { e.preventDefault(); first.click(); }
    }
  });
  el.querySelectorAll('.search-chip').forEach(c => c.addEventListener('click', () => {
    filter = c.dataset.f; el.querySelectorAll('.search-chip').forEach(x => x.classList.toggle('on', x === c)); renderResults();
  }));
  renderResults();
  setTimeout(() => { const i = el.querySelector('#search-input'); if (i) i.focus(); }, 50);
}

// === Compare mode (two teams or two players head-to-head) ===
function openCompare() {
  if (document.getElementById('compare-overlay')) return;
  // Open on the mode that matches where you clicked from: the current Team Ranking
  // sub-view (Teams / Nations / Players), or Players when on the My Position tab.
  let mode = currentTab === 'position' ? 'players'
    : currentTab === 'teams' ? teamView
    : 'teams';
  const cleanups = []; // listeners to remove when the modal closes (combo outside-click)
  const better = (a, b) => (a || 0) > (b || 0) ? 0 : (b || 0) > (a || 0) ? 1 : -1; // 0=A,1=B,-1=tie
  const lower = (a, b) => a < b ? 0 : b < a ? 1 : -1;
  const el = document.createElement('div');
  el.className = 'modal-overlay'; el.id = 'compare-overlay';
  el.innerHTML = `
    <div class="modal compare-modal" onclick="event.stopPropagation()">
      <div class="modal-header">
        <div class="modal-title-block"><h2 class="modal-title">⚖️ COMPARE</h2><div class="modal-subtitle">Head to head</div></div>
        <button class="modal-close" id="compare-close" aria-label="Close">×</button>
      </div>
      <div class="compare-body">
        <div class="search-chips">
          <button class="search-chip${mode === 'teams' ? ' on' : ''}" data-m="teams">Teams</button>
          <button class="search-chip${mode === 'nations' ? ' on' : ''}" data-m="nations">Nations</button>
          <button class="search-chip${mode === 'players' ? ' on' : ''}" data-m="players">Players</button>
        </div>
        <div class="compare-selects">
          <div class="cmp-combo" id="combo-a">
            <input class="cmp-input" type="text" autocomplete="off" aria-label="First selection" placeholder="Type or pick…" />
            <button class="cmp-caret" type="button" tabindex="-1" aria-label="Toggle list">▾</button>
            <div class="cmp-list" role="listbox" hidden></div>
          </div>
          <span class="cmp-vs">VS</span>
          <div class="cmp-combo" id="combo-b">
            <input class="cmp-input" type="text" autocomplete="off" aria-label="Second selection" placeholder="Type or pick…" />
            <button class="cmp-caret" type="button" tabindex="-1" aria-label="Toggle list">▾</button>
            <div class="cmp-list" role="listbox" hidden></div>
          </div>
        </div>
        <div id="compare-table"></div>
      </div>
    </div>`;
  document.body.appendChild(el);
  document.body.style.overflow = 'hidden';
  const close = () => { cleanups.forEach(fn => fn()); el.remove(); document.body.style.overflow = ''; document.removeEventListener('keydown', onKey); };
  const onKey = e => { if (e.key === 'Escape') close(); };
  el.addEventListener('click', e => { if (e.target === el) close(); });
  el.querySelector('#compare-close').addEventListener('click', close);
  document.addEventListener('keydown', onKey);

  let comboA, comboB;
  const optionsFor = () => mode === 'teams' ? sortedTeams.map(t => t.country)
    : mode === 'nations' ? nationsRanking().map(n => n.label)
    : sortedGoldenBoot.map(p => p.name);
  // If we opened from My Position and a player is resolved, pre-fill them as A.
  let presetA = null;
  if (currentTab === 'position') {
    const q = positionQuery.trim().toLowerCase();
    if (q.length >= 2) {
      const matches = people.filter(p => p.name.toLowerCase().includes(q));
      const found = matches.length === 1 ? matches[0] : matches.find(p => p.name.toLowerCase() === q);
      if (found) presetA = found.name;
    }
  }
  const fill = () => {
    const opts = optionsFor();
    if (presetA && mode === 'players' && opts.includes(presetA)) {
      comboA.setValue(presetA);
      comboB.setValue(opts.find(o => o !== presetA) || opts[1] || opts[0] || '');
    } else {
      comboA.setValue(opts[0] || '');
      comboB.setValue(opts[1] || opts[0] || '');
    }
    presetA = null; // honour the preset only on the first fill
  };
  const draw = () => {
    const aV = comboA.getValue(), bV = comboB.getValue();
    let rows;
    const hint = m => { el.querySelector('#compare-table').innerHTML = `<div class="no-result">${m}</div>`; };
    if (mode === 'teams') {
      const A = teams.find(t => t.country === aV), B = teams.find(t => t.country === bV);
      if (!A || !B) return hint('Type and pick two teams to compare.');
      const rk = c => sortedTeams.findIndex(t => t.country === c) + 1;
      rows = [
        ['World Cup rank', `#${rk(aV)}`, `#${rk(bV)}`, lower(rk(aV), rk(bV))],
        ['Avg PS / person', fmtMoney(A.avg_ps), fmtMoney(B.avg_ps), better(A.avg_ps, B.avg_ps)],
        ['Total PS', fmtMoney(A.total_ps), fmtMoney(B.total_ps), better(A.total_ps, B.total_ps)],
        ['Members', A.members, B.members, -1],
        ['Avg GM', fmtPct(A.avg_gm), fmtPct(B.avg_gm), better(A.avg_gm, B.avg_gm)],
        ['Avg meetings', fmtNum(A.avg_meetings), fmtNum(B.avg_meetings), better(A.avg_meetings, B.avg_meetings)],
        ['Avg opps', fmtNum(A.avg_opps), fmtNum(B.avg_opps), better(A.avg_opps, B.avg_opps)]
      ];
    } else if (mode === 'nations') {
      const nations = nationsRanking();
      const A = nations.find(n => n.label === aV), B = nations.find(n => n.label === bV);
      if (!A || !B) return hint('Type and pick two nations to compare.');
      const rk = lbl => nations.findIndex(n => n.label === lbl) + 1;
      rows = [
        ['Nations rank', `#${rk(aV)}`, `#${rk(bV)}`, lower(rk(aV), rk(bV))],
        ['Avg PS / person', fmtMoney(A.avg_ps), fmtMoney(B.avg_ps), better(A.avg_ps, B.avg_ps)],
        ['Total PS', fmtMoney(A.total_ps), fmtMoney(B.total_ps), better(A.total_ps, B.total_ps)],
        ['Avg GM', fmtPct(A.avg_gm), fmtPct(B.avg_gm), better(A.avg_gm, B.avg_gm)],
        ['Teams', A.teams, B.teams, -1],
        ['People', A.people, B.people, -1]
      ];
    } else {
      const A = people.find(p => p.name === aV), B = people.find(p => p.name === bV);
      if (!A || !B) return hint('Type and pick two players to compare.');
      const gr = n => sortedGoldenBoot.findIndex(p => p.name === n) + 1, pr = n => sortedPlaymaker.findIndex(p => p.name === n) + 1;
      rows = [
        ['Team', A.team, B.team, -1],
        ['Golden Boot rank', `#${gr(aV)}`, `#${gr(bV)}`, lower(gr(aV), gr(bV))],
        ['PS New Business', fmtMoney(A.ps_nb), fmtMoney(B.ps_nb), better(A.ps_nb, B.ps_nb)],
        ['Playmaker rank', `#${pr(aV)}`, `#${pr(bV)}`, lower(pr(aV), pr(bV))],
        ['Opps created', Number(A.opps || 0).toFixed(0), Number(B.opps || 0).toFixed(0), better(A.opps, B.opps)],
        ['PS Total', fmtMoney(A.ps_total), fmtMoney(B.ps_total), better(A.ps_total, B.ps_total)],
        ['GM total', fmtPct(A.ps_total_gm), fmtPct(B.ps_total_gm), better(A.ps_total_gm, B.ps_total_gm)],
        ['Meetings / wk', fmtNum(A.meetings), fmtNum(B.meetings), better(A.meetings, B.meetings)]
      ];
    }
    // Count category wins to crown an overall winner. On a tie, the better-ranked
    // side (the first row is always the rank row) takes the crown — so there's
    // always a champion, even in Teams where ties are common.
    let winsA = 0, winsB = 0;
    rows.forEach(r => { if (r[3] === 0) winsA++; else if (r[3] === 1) winsB++; });
    let leader = winsA > winsB ? 0 : winsB > winsA ? 1 : -1;
    if (leader === -1 && rows.length && (rows[0][3] === 0 || rows[0][3] === 1)) leader = rows[0][3];

    // Build the team-coloured "Panini" face-off cards for each side.
    const colorOf = name => mode === 'players'
      ? colorForTeam((people.find(p => p.name === name) || {}).team)
      : colorForTeam(name);
    const flagOf = name => {
      if (mode === 'players') return flagForTeam((people.find(p => p.name === name) || {}).team);
      if (mode === 'nations') { const n = nationsRanking().find(x => x.label === name); return n ? (FLAG_STRIPES[n.region] || FLAG_STRIPES.OTHER) : FLAG_STRIPES.OTHER; }
      return flagForTeam(name);
    };
    const subOf = name => {
      if (mode === 'players') { const p = people.find(x => x.name === name) || {}; return escapeHtml(p.team || ''); }
      if (mode === 'nations') { const n = nationsRanking().find(x => x.label === name) || {}; return `${n.teams || 0} teams · ${n.people || 0} people`; }
      const t = teams.find(x => x.country === name) || {}; return `${t.members || 0} members`;
    };
    const initialsOf = name => name.replace(/[^A-Za-z0-9 ]/g, '').split(/\s+/).filter(Boolean).map(w => w[0]).join('').slice(0, 2).toUpperCase();
    const card = (name, wins, side, isLeader) => `
      <div class="cmp-card${isLeader ? ' cmp-card-win' : ''}" style="--c:${colorOf(name)}">
        ${isLeader ? '<span class="cmp-crown">👑</span>' : ''}
        <span class="cmp-card-flag">${flagBars(flagOf(name))}</span>
        <span class="cmp-card-badge${(mode === 'players' && photoFor(name)) ? ' cmp-card-badge-photo' : ''}">${(mode === 'players' && photoFor(name)) ? `<img class="cmp-card-photo" src="${photoThumb(name)}" alt="" loading="lazy" onerror="this.parentElement.classList.remove('cmp-card-badge-photo');this.outerHTML='${initialsOf(name) || '—'}'" />` : (initialsOf(name) || '—')}</span>
        <div class="cmp-card-name">${escapeHtml(name)}</div>
        <div class="cmp-card-sub">${subOf(name)}</div>
        <div class="cmp-card-wins">${wins}<small>${wins === 1 ? 'win' : 'wins'}</small></div>
      </div>`;

    el.querySelector('#compare-table').innerHTML = `
      <div class="cmp-faceoff">
        ${card(aV, winsA, 'a', leader === 0)}
        <div class="cmp-vs-badge">VS</div>
        ${card(bV, winsB, 'b', leader === 1)}
      </div>
      <div class="cmp-rows">
        ${rows.map(r => `
          <div class="cmp-line">
            <span class="cmp-line-a ${r[3] === 0 ? 'win' : ''}">${r[1]}</span>
            <span class="cmp-line-label">${r[0]}</span>
            <span class="cmp-line-b ${r[3] === 1 ? 'win' : ''}">${r[2]}</span>
          </div>`).join('')}
      </div>`;
  };
  // Custom combobox: a text input you can TYPE in (filters the list) plus a ▾
  // caret that opens the full dropdown — works reliably on mobile/tablet too.
  function setupCombo(root) {
    const input = root.querySelector('.cmp-input');
    const caret = root.querySelector('.cmp-caret');
    const list = root.querySelector('.cmp-list');
    let active = -1;
    const renderList = (filter) => {
      const f = (filter || '').toLowerCase();
      const opts = optionsFor().filter(o => o.toLowerCase().includes(f));
      list.innerHTML = opts.length
        ? opts.map(o => `<div class="cmp-opt" role="option" data-v="${escapeHtml(o)}">${escapeHtml(o)}</div>`).join('')
        : '<div class="cmp-opt cmp-empty">No match</div>';
      active = -1;
    };
    const openList = (filter) => { renderList(filter); list.hidden = false; root.classList.add('open'); };
    const closeList = () => { list.hidden = true; root.classList.remove('open'); };
    const commit = (v) => { input.value = v; closeList(); draw(); };
    input.addEventListener('focus', () => openList(''));
    input.addEventListener('input', () => { openList(input.value); draw(); });
    input.addEventListener('keydown', e => {
      const opts = [...list.querySelectorAll('.cmp-opt:not(.cmp-empty)')];
      if (e.key === 'ArrowDown') { e.preventDefault(); if (list.hidden) openList(''); active = Math.min(active + 1, opts.length - 1); }
      else if (e.key === 'ArrowUp') { e.preventDefault(); active = Math.max(active - 1, 0); }
      else if (e.key === 'Enter') { if (!list.hidden) { e.preventDefault(); const pick = opts[active] || opts[0]; if (pick) commit(pick.dataset.v); } return; }
      else if (e.key === 'Escape') { if (!list.hidden) { e.preventDefault(); closeList(); } return; }
      else return;
      opts.forEach((o, i) => o.classList.toggle('active', i === active));
      if (opts[active]) opts[active].scrollIntoView({ block: 'nearest' });
    });
    caret.addEventListener('click', e => { e.preventDefault(); if (list.hidden) { input.focus(); openList(''); } else closeList(); });
    list.addEventListener('mousedown', e => { const o = e.target.closest('.cmp-opt:not(.cmp-empty)'); if (o) { e.preventDefault(); commit(o.dataset.v); } });
    const outside = e => { if (!root.contains(e.target)) closeList(); };
    document.addEventListener('mousedown', outside);
    cleanups.push(() => document.removeEventListener('mousedown', outside));
    return { getValue: () => input.value, setValue: v => { input.value = v; } };
  }
  comboA = setupCombo(el.querySelector('#combo-a'));
  comboB = setupCombo(el.querySelector('#combo-b'));
  el.querySelectorAll('.search-chip').forEach(c => c.addEventListener('click', () => {
    mode = c.dataset.m; el.querySelectorAll('.search-chip').forEach(x => x.classList.toggle('on', x === c)); fill(); draw();
  }));
  fill(); draw();
}

// === LIVE: TV / projection mode ===
let tvMode = false, tvPanel = 0, tvTimer = null;
const TV_PANELS = ['podium', 'golden', 'playmaker', 'spotlight', 'var', 'fairplay', 'awards'];

// No auto-rotation: TV mode is a manually-driven deck so commentators control the
// pace. Navigate with arrows / dots / swipe / ← → keys.
function tvGo(delta) {
  if (!tvMode) return;
  const n = TV_PANELS.length;
  tvPanel = (tvPanel + delta + n) % n;
  renderTV();

// === LIVE: polling ===
let pollIntervalId = null;

// Preserve the caret when a re-render rebuilds #app under a focused text input
// (e.g. a background poll lands while someone is typing in a search box).
// Without this, render() destroys the focused <input> and the caret is lost.
function captureFocus() {
  const el = document.activeElement;
  if (el && el.id && (el.tagName === 'INPUT' || el.tagName === 'TEXTAREA')) {
    return { id: el.id, start: el.selectionStart, end: el.selectionEnd };
  }
  return null;
}
function restoreFocus(f) {
  if (!f) return;
  const el = document.getElementById(f.id);
  if (!el) return;
  el.focus();
  try { el.setSelectionRange(f.start, f.end); } catch (e) {}
}

// Small debounce so search inputs don't trigger a full re-render on every
// keystroke (377 people + four findIndex scans per modal = perceptible jank
// on low-end phones).
function debounce(fn, ms) {
  let id = null;
  return function () {
    const ctx = this, args = arguments;
    if (id) clearTimeout(id);
    id = setTimeout(() => { id = null; fn.apply(ctx, args); }, ms);
  };
}

// Background refresh used by polling and on tab re-focus: uses the server cache
// (fresh=false) to stay fast and protect the Apps Script quota, and never
// replays entrance animations.
async function backgroundRefresh() {
  const success = await fetchData(false);
  if (success) {
    const scrollY = window.scrollY;
    const focus = captureFocus(); // don't yank the caret out of a search box mid-type
    suppressAnim = true;
    try { render(); } finally { suppressAnim = false; }
    window.scrollTo(0, scrollY);
    restoreFocus(focus);
    applyDigestVisibility(); // a new week may have landed → show the recap dot
    if (tvMode) renderTV(); // keep the projection panel live
  }
  return success;
}

function nextPollDelay() {
  // Base interval ± jitter (0.75x–1.25x) so clients don't poll in lockstep.
  // This spreads requests out and avoids the "thundering herd" spikes at launch.
  return Math.round(CONFIG.POLL_INTERVAL_MS * (0.75 + Math.random() * 0.5));
}

function startPolling() {
  stopPolling();
  const tick = () => {
    backgroundRefresh();
    pollIntervalId = setTimeout(tick, nextPollDelay());
  };
  pollIntervalId = setTimeout(tick, nextPollDelay());
}

function stopPolling() {
  if (pollIntervalId) { clearTimeout(pollIntervalId); pollIntervalId = null; }
}

// === Idle auto-pause ===
// A forgotten open tab shouldn't keep polling for hours (that's what blows the
// Apps Script quota at scale). After IDLE_TIMEOUT_MS with no interaction we
// stop polling and show a small "paused" banner; any interaction resumes it.
let idleTimer = null;
let idlePaused = false;
function showIdleBanner(show) {
  let el = document.getElementById('idle-banner');
  if (show) {
    if (!el) {
      el = document.createElement('button');
      el.id = 'idle-banner';
      el.className = 'idle-banner';
      el.innerHTML = '⏸️ Live updates paused · tap to resume';
      el.addEventListener('click', resumeFromIdle);
      document.body.appendChild(el);
    }
    el.style.display = 'flex';
  } else if (el) {
    el.style.display = 'none';
  }
}
function goIdle() {
  if (idlePaused) return;
  idlePaused = true;
  stopPolling();
  showIdleBanner(true);
}
function resumeFromIdle() {
  if (idlePaused) {
    idlePaused = false;
    showIdleBanner(false);
    backgroundRefresh(); // catch up immediately
    startPolling();
  }
  armIdleTimer();
}
function armIdleTimer() {
  if (idleTimer) clearTimeout(idleTimer);
  idleTimer = setTimeout(goIdle, CONFIG.IDLE_TIMEOUT_MS);
}
// Any meaningful interaction re-arms the idle timer (and resumes if paused).
['click', 'keydown', 'touchstart', 'scroll'].forEach(evt =>
  window.addEventListener(evt, () => { if (idlePaused) resumeFromIdle(); else armIdleTimer(); }, { passive: true }));

// Pause polling when the tab is hidden (saves Apps Script quota).
document.addEventListener('visibilitychange', () => {
  if (!isLoggedIn()) return;
  if (document.hidden) { stopPolling(); if (idleTimer) clearTimeout(idleTimer); }
  else if (!idlePaused) { backgroundRefresh(); startPolling(); armIdleTimer(); }
});

// === LIVE: manual refresh (header button) ===
async function manualRefresh() {
  const btn = document.getElementById('refresh-btn');
  if (btn) btn.classList.add('spinning');
  const scrollY = window.scrollY;
  await fetchData(true); // force a fresh read, bypass server cache
  suppressAnim = true;
  try { render(); } finally { suppressAnim = false; }
  window.scrollTo(0, scrollY);
  if (tvMode) renderTV();
  if (btn) setTimeout(() => btn.classList.remove('spinning'), 600);
}

// === LIVE: app init ===
async function init() {
  const app = document.getElementById('app');

  if (!isLoggedIn()) {
    setChromeVisible(false);
    prewarmBackend(); // wake Apps Script while the user reads/types — hides the cold start
    const showLogin = (err) => {
      app.innerHTML = renderLoginScreen(err);
      const form = document.getElementById('login-form');
      const btn = document.getElementById('login-btn');
      const input = document.getElementById('login-pwd');
      const submit = async () => {
        const pwd = input.value.trim();
        if (!pwd) return;
        btn.textContent = t('login.checking');
        btn.disabled = true;
        const ok = await attemptLogin(pwd);
        if (ok === true) {
          init(); // re-init now that we're authenticated
        } else if (ok === false) {
          showLogin(t('login.bad'));
        } else {
          showLogin(t('login.err'));
        }
      };
      // A real <form> submit handles both the button click and the Enter key,
      // and lets password managers offer to save the access code.
      form.addEventListener('submit', e => { e.preventDefault(); submit(); });
      input.focus();
    };
    showLogin();
    return;
  }

  // Logged in: show the app chrome, then paint as fast as possible.
  setChromeVisible(true);

  // Fast path — a recent payload is cached: paint it instantly (no loader, no
  // kick-off animation) and refresh quietly in the background. Feels instant.
  if (hydrateFromSnapshot()) {
    restoreTab();
    render();
    app.style.animation = 'appEnter 0.3s ease both';
    setTimeout(() => { app.style.animation = ''; }, 320);
    // Stagger the background refresh by a random 0–2.5s so 400 people opening the
    // link at launch don't hit the Apps Script all in the same instant. The data
    // is already painted from the snapshot, so this delay is invisible.
    setTimeout(backgroundRefresh, Math.random() * 2500);
  } else {
    // Cold path — nothing cached: show the football loader while we fetch.
    const loadStart = performance.now();
    app.innerHTML = renderLoader();
    const ok = await fetchData();
    if (!ok) {
      app.innerHTML = `<div class="state-msg error">Failed to load data.<br/><button class="login-btn" onclick="location.reload()">Retry</button></div>`;
      return;
    }
    // Keep the kick-off snappy: a short beat so the animation reads, no more.
    const elapsed = performance.now() - loadStart;
    if (elapsed < 350) await new Promise(r => setTimeout(r, 350 - elapsed));
    await playKickoff();
    restoreTab();
    introCountup = true; // first real paint → podium scores count up from 0
    render();
    app.style.animation = 'appEnter 0.45s ease both';
    setTimeout(() => { app.style.animation = ''; }, 500);
  }

  // Brand-new visitor? Run the short guided tour (once).
  maybeShowTour();

  // Bind the header refresh button once (it lives outside #app, so it survives re-renders).
  const refreshBtn = document.getElementById('refresh-btn');
  if (refreshBtn && !refreshBtn.dataset.bound) {
    refreshBtn.dataset.bound = '1';
    refreshBtn.addEventListener('click', () => { if (isAdmin()) manualRefresh(); });
  }
  applyAdminVisibility(); // manual refresh is admin-only

  // Bind the TV/projection button once.
  const tvBtn = document.getElementById('tv-btn');
  if (tvBtn && !tvBtn.dataset.bound) {
    tvBtn.dataset.bound = '1';
    tvBtn.addEventListener('click', toggleTV);
  }
  const rulesBtn = document.getElementById('rules-btn');
  if (rulesBtn && !rulesBtn.dataset.bound) {
    rulesBtn.dataset.bound = '1';
    rulesBtn.addEventListener('click', openRules);
  }
  const digestBtn = document.getElementById('digest-btn');
  if (digestBtn && !digestBtn.dataset.bound) {
    digestBtn.dataset.bound = '1';
    digestBtn.addEventListener('click', openDigest);
  }
  applyDigestVisibility(); // show 📰 + dot only when there's a fresh recap
  const themeBtn = document.getElementById('theme-btn');
  if (themeBtn && !themeBtn.dataset.bound) {
    themeBtn.dataset.bound = '1';
    themeBtn.addEventListener('click', toggleTheme);
  }
  const searchBtn = document.getElementById('search-btn');
  if (searchBtn && !searchBtn.dataset.bound) {
    searchBtn.dataset.bound = '1';
    searchBtn.addEventListener('click', openSearch);
  }
  initScrollTop();

  startPolling();
  armIdleTimer(); // auto-pause polling on a forgotten/idle tab

  // Projection screens: ?tv=1 launches straight into TV mode (param kept so a
  // reload re-enters it). Fullscreen itself may need one click/F11 (browser rule).
  try {
    if (!tvMode && new URLSearchParams(location.search).get('tv') === '1') enterTV();
  } catch (e) {}

  // Shareable player link: ?player=Name opens that player's card on load.
  try {
    const who = new URLSearchParams(location.search).get('player');
    if (who) {
      const match = people.find(p => p.name.toLowerCase() === who.toLowerCase())
        || people.find(p => p.name.toLowerCase().includes(who.toLowerCase()));
      if (match) { openPlayerModal = match.name; render(); document.body.style.overflow = 'hidden'; }
    }
  } catch (e) {}
}

// Read the admin activation param before anything else renders.
document.documentElement.lang = 'en';
applyTheme(currentTheme());
checkAdminParam();

// Never leave a silent blank page: surface any unexpected init error.
init().catch(err => {
  console.error('Init error:', err);
  const app = document.getElementById('app');
  if (app) app.innerHTML = `<div class="state-msg error">Something went wrong loading the app.<br/><button class="login-btn" onclick="location.reload()">Reload</button></div>`;
});

// Tick the live countdown every second (no-ops until the footer exists).
setInterval(updateCountdown, 1000);

// PWA: register the service worker (https only; silently ignored on file://).
// When a new worker takes control after a deploy, reload once so users always
// land on the latest build without a manual hard refresh.
if ('serviceWorker' in navigator) {
  // Only auto-reload on UPDATES (a worker already controls the page), never on the
  // first-ever install — and only once, so there is no reload loop.
  if (navigator.serviceWorker.controller) {
    let swReloaded = false;
    navigator.serviceWorker.addEventListener('controllerchange', () => {
      if (swReloaded) return;
      swReloaded = true;
      location.reload();
    });
  }
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('service-worker.js').then(reg => {
      reg.update().catch(() => {}); // proactively check for a new build each load
    }).catch(() => {});
  });
}
</script>
</body>
</html>
